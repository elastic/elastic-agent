receivers:
  filebeatreceiver:
    filebeat:
      inputs:
        - type: journald
          id: journald-input
          paths:
            - /opt/journal/
          merge: true

    output:
      otelconsumer:
    logging:
      level: debug
      selectors:
        - '*'

processors:
  resource:
    attributes:
    - key: data_stream.namespace
      action: insert
      value: "${EA_POLICY_NAMESPACE}"

  transform/add-mapping-mode:
    log_statements:
    - context: scope
      statements:
      - set(attributes["elastic.mapping.mode"], "none")

exporters:
  elasticsearch:
    logs_index: "${EA_POLICY_NAMESPACE}"
    endpoint: "${ES_HOST}"
    api_key: "${ES_API_KEY_ENCODED}"

service:
  pipelines:
    logs:
      receivers: [filebeatreceiver]
      processors: [resource, transform/add-mapping-mode]
      exporters:
        - elasticsearch
  telemetry:
    logs:
      level: DEBUG
      encoding: json
      disable_stacktrace: true

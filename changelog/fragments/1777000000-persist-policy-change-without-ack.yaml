kind: bug-fix

summary: Report policy id and revision in checkin when acks are disabled

description: |
  Persist the applied POLICY_CHANGE action in the state store regardless of
  the disable_policy_change_acks flag, and read agent_policy_id and
  policy_revision_idx from the action's policy data fields ("id" and
  "revision") that fleet-server actually emits. Without this, Fleet's view
  of the agent's policy revision never advanced when acks were disabled.

component: "elastic-agent"

issue: https://github.com/elastic/kibana/issues/264983

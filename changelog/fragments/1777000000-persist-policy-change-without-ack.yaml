kind: bug-fix

summary: Report policy id and revision in checkin when acks are disabled

description: |
  Persist the applied POLICY_CHANGE action in the state store regardless of
  the disable_policy_change_acks flag, and parse agent_policy_id and
  policy_revision_idx from the action ID when fleet-server does not include
  them in the policy data. Without this, Fleet's view of the agent's policy
  revision never advanced when acks were disabled.

component: "elastic-agent"

issue: https://github.com/elastic/kibana/issues/264983

    - kind: bug-fix
      summary: Ship config samples, OTel collector spec, and endpoint resources zip without executable bits
      description: |
        Several non-executable files were being installed with mode 0755 in
        Elastic Agent packages: the OTel sample configs under `otel_samples/`,
        the `elastic-otel-collector.spec.yml` file, and the
        `endpoint-security-resources.zip` resource bundle. These files now
        ship with mode 0644 across deb, rpm, tar.gz, and zip packages.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/14117
      issue:
        - https://github.com/elastic/elastic-agent/issues/13960
      impact: ""
      action: ""
      timestamp: 1778020336
      file:
        name: 1778020336-fix-non-executable-package-file-permissions.yaml
        checksum: c9ac7e213785e555b1eeabe84065a0be80432b17
    - kind: bug-fix
      summary: Policy log level changes are applied after an agent restart
      description: |
        After an agent had been restarted, changing the log level in the Fleet
        policy had no effect, the agent kept reporting and using the previous log
        level. Policy log level changes now take effect on agents that have already
        been restarted.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/14078
      issue:

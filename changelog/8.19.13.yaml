version: 8.19.13
entries:
    - kind: feature
      summary: Add support for encrypted config for standalone agents
      description: |
        Add a new agent.features.encrypted_config.enabled config attribute
        that enables the use of encrypted config when the agent is operating
        in stand-alone mode. Agents managed through fleet will ignore this
        flag and always use encrypted config. If this flag is present, the
        agent will encrypt config, and replace the elastic-agent.yml file
        contents with only the feature flag.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/12852
        - https://github.com/elastic/elastic-agent/pull/13075
        - https://github.com/elastic/elastic-agent/pull/12909
        - https://github.com/elastic/elastic-agent/pull/13128
        - https://github.com/elastic/elastic-agent/pull/13129
        - https://github.com/elastic/elastic-agent/pull/13134
        - https://github.com/elastic/elastic-agent/pull/13127
      issue:
        - https://github.com/elastic/elastic-agent/issues/7283
      impact: ""
      action: ""
      timestamp: 1769800077
      file:
        name: 1769800077-Add-support-for-encrypted-config-for-standalone-agents.yaml
        checksum: 588a429bd1c59d9fb3bfd1a373879712f44634ae

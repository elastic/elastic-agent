    - kind: enhancement
      summary: Run all metricbeat inputs in an otel collector
      description: |-
        The following metricbeat inputs will now use the otel runtime by default, relative to 9.3:

          - "aerospike/metrics"
          - "autoops_es/metrics"
          - "aws/metrics"
          - "awsfargate/metrics"
          - "azure/metrics"
          - "cloudfoundry/metrics"
          - "gcp/metrics"
          - "haproxy/metrics"
          - "iis/metrics"
          - "kubernetes/metrics"
          - "meraki/metrics"
          - "mssql/metrics"
          - "openai/metrics"
          - "oracle/metrics"
          - "panw/metrics"
          - "postgresql/metrics"
          - "prometheus/metrics"
          - "redis/metrics"
          - "syncgateway/metrics"
          - "traefik/metrics"
          - "uwsgi/metrics"
          - "windows/metrics"
          - "zookeeper/metrics"


        This will result in a memory reduction since fewer agentbeat processes are started, because the otel runtime runs within the collector process. If the policy is not compatible with the otel runtime, it will fall back to the process runtime.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/13534
        - https://github.com/elastic/elastic-agent/pull/13916

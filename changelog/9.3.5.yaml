    - kind: bug-fix
      summary: Stop MIGRATE action from inheriting source cluster configuration
      description: |
        The MIGRATE action previously merged the source cluster's fleet
        configuration (TLS CAs, proxy settings, etc.) with the migration
        action's settings. This caused agents enrolled with a custom CA to
        fail when migrating to a cluster with a different trust chain (e.g.,
        from self-managed with a custom CA to Elastic Cloud with a public CA)
        with "certificate signed by unknown authority". The migrate action now
        builds enrollment options solely from what the action provides,
        falling back to system defaults (e.g., OS trust store) for any fields
        not specified.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/13756
      issue: []
      impact: ""
      action: ""
      timestamp: 1776878791
      file:
        name: 1776878791-fix-migrate-action-inherits-source-config.yaml
        checksum: 4f58b53b752df48144890038a20c6a3a2f0cb49d
    - kind: bug-fix
      summary: Report policy id and revision in checkin when acks are disabled
      description: |
        Persist the applied POLICY_CHANGE action in the state store regardless of
        the disable_policy_change_acks flag, and read agent_policy_id and
        policy_revision_idx from the action's policy data fields ("id" and
        "revision") that fleet-server actually emits. Without this, Fleet's view
        of the agent's policy revision never advanced when acks were disabled.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/13938

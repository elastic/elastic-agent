    - kind: bug-fix
      summary: Fix handling of console events on Windows
      description: |
        When Elastic Agent runs in a console on Windows and receives an event like CTRL+C/CTRL+BREAK, it now
        exits gracefully.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/14095
        - https://github.com/elastic/elastic-agent/pull/14024

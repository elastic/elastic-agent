    - kind: security
      summary: Redact sensitive HTTP header values embedded in Fleet env vars in diagnostics archives
      description: |
        Diagnostics archives could expose authentication tokens when Fleet header environment
        variables (such as FLEET_HEADER, FLEET_HEADERS, FLEET_KIBANA_HEADER, and
        FLEET_KIBANA_HEADERS) contained sensitive HTTP header values. The diagnostics redaction
        logic now expands and redacts individual header values within these variables.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/15284
      issue: []
      impact: ""
      action: ""
      timestamp: 1783056842
      file:
        name: 1783056842-redact-fleet-header-values-in-diagnostics-env-vars.yaml
        checksum: 7a363ee772629a77aaa8c15465928fd37570b669
    - kind: bug-fix
      summary: Fix translation of `queue.mem.flush.timeout` to OTel `flush_timeout` for unitless values
      description: |
        When translating an output's Beats configuration to an OpenTelemetry Collector
        configuration, a unitless queue.mem.flush.timeout value (e.g. `5`, which Beats
        interprets as 5 seconds) was passed through verbatim as a string to the exporterhelper
        sending_queue.batch.flush_timeout option. Because that option is a time.Duration,
        the collector failed to start with "'flush_timeout' time: missing unit in duration".
        Unitless values are now suffixed with the seconds unit.
      component: elastic-agent
      pr:
        - https://github.com/elastic/elastic-agent/pull/15456
        - https://github.com/elastic/elastic-agent/pull/14871
        - https://github.com/elastic/elastic-agent/pull/15550
        - https://github.com/elastic/elastic-agent/pull/15513
        - https://github.com/elastic/elastic-agent/pull/15542
        - https://github.com/elastic/elastic-agent/pull/15618
      issue:
        - https://github.com/elastic/elastic-agent/issues/7183
        - https://github.com/elastic/elastic-agent/issues/14746
      impact: ""
      action: ""
      timestamp: 1783071900
      file:
        name: 1783071900-fix-otel-flush-timeout-missing-unit.yaml
        checksum: d1d7ce21ef7c4b49bc282060bf53a65680333231

- file:
    name: 12187.yaml
    checksum: dd962e004ccd4ddb4687ec93f847434a7cfacccf
  type: breaking-change
  title: Remove Elastic Agent global CLI flags from `otel` subcommand.
  products:
  - product: elastic-agent
    target: 9.3.0
  description: 'The `elastic-agent otel` subcommand no longer accepts global CLI flags that had no effect: `-c`, `--path.home`, `--path.home.unversioned`, `--path.config`, `--path.logs`, `--path.socket` and `--path.downloads`.'
  impact: Removal of these flags can result in otel subcommand failure, if they being are used. These flags had no effect on the otel subcommand behavior.
  prs:
  - https://github.com/elastic/elastic-agent/pull/12187

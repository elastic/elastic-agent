name: "PR Buildkite Flaky Test Reporter"
"on":
  workflow_call:
    inputs:
      additional-instructions:
        default: ""
        description: Repo-specific instructions appended to the agent prompt
        required: false
        type: string
      allowed-bot-users:
        default: github-actions[bot]
        description: Allowed bot actor usernames (comma-separated)
        required: false
        type: string
      buildkite-org:
        default: ""
        description: Buildkite organization slug (required when `trigger-mode` is `pull_request`)
        required: false
        type: string
      buildkite-pipeline:
        default: ""
        description: Buildkite pipeline slug (required when `trigger-mode` is `pull_request`)
        required: false
        type: string
      flaky-test-label:
        default: flaky-test
        description: Label applied to flaky-test issues and used when searching for matching issues
        required: false
        type: string
      messages-footer:
        default: ""
        description: Footer appended to all agent comments and reviews
        required: false
        type: string
      model:
        default: gpt-5.3-codex
        description: AI model to use
        required: false
        type: string
      setup-commands:
        default: ""
        description: Shell commands to run before the agent starts (dependency install, build, etc.)
        required: false
        type: string
      title-prefix:
        default: "[Flaky Test]: "
        description: Title prefix for newly filed flaky-test issues
        required: false
        type: string
      trigger-mode:
        default: check_run
        description: Which event the trigger fires on. Must match the trigger's `on:` event. 'check_run' reads the Buildkite build URL from the check_run payload. 'pull_request' looks up the most recent finished Buildkite build for the PR's head branch via the Buildkite API and requires both `buildkite-org` and `buildkite-pipeline`.
        required: false
        type: string
    outputs:
      comment_id:
        description: ID of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_id }}
      comment_url:
        description: URL of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_url }}

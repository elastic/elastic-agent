      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        GH_AW_GITHUB_REPOSITORY: ${{ github.repository }}
        GH_AW_EXPR_49B959F1: ${{ inputs.additional-instructions }}
        GH_AW_EXPR_A4D25EE8: ${{ inputs.flaky-test-label }}
        GH_AW_EXPR_BF503D80: ${{ inputs.title-prefix }}
        GH_AW_EXPR_1C437C4C: ${{ inputs.trigger-mode }}
      with:
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/interpolate_prompt.cjs');
          await main();
    - name: Substitute placeholders
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        GH_AW_EXPR_1C437C4C: ${{ inputs.trigger-mode }}
        GH_AW_EXPR_49B959F1: ${{ inputs.additional-instructions }}
        GH_AW_EXPR_A4D25EE8: ${{ inputs.flaky-test-label }}
        GH_AW_EXPR_BF503D80: ${{ inputs.title-prefix }}
        GH_AW_GITHUB_ACTOR: ${{ github.actor }}
        GH_AW_GITHUB_EVENT_COMMENT_ID: ${{ github.event.comment.id }}
        GH_AW_GITHUB_EVENT_DISCUSSION_NUMBER: ${{ github.event.discussion.number }}
        GH_AW_GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        GH_AW_GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        GH_AW_GITHUB_REPOSITORY: ${{ github.repository }}
        GH_AW_GITHUB_RUN_ID: ${{ github.run_id }}
        GH_AW_GITHUB_WORKSPACE: ${{ github.workspace }}
        GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED: ${{ needs.pre_activation.outputs.activated }}
      with:
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);

          const substitutePlaceholders = require('${{ runner.temp }}/gh-aw/actions/substitute_placeholders.cjs');

          // Call the substitution function
          return await substitutePlaceholders({
            file: process.env.GH_AW_PROMPT,
            substitutions: {
              GH_AW_EXPR_1C437C4C: process.env.GH_AW_EXPR_1C437C4C,
              GH_AW_EXPR_49B959F1: process.env.GH_AW_EXPR_49B959F1,
              GH_AW_EXPR_A4D25EE8: process.env.GH_AW_EXPR_A4D25EE8,
              GH_AW_EXPR_BF503D80: process.env.GH_AW_EXPR_BF503D80,
              GH_AW_GITHUB_ACTOR: process.env.GH_AW_GITHUB_ACTOR,
              GH_AW_GITHUB_EVENT_COMMENT_ID: process.env.GH_AW_GITHUB_EVENT_COMMENT_ID,
              GH_AW_GITHUB_EVENT_DISCUSSION_NUMBER: process.env.GH_AW_GITHUB_EVENT_DISCUSSION_NUMBER,
              GH_AW_GITHUB_EVENT_ISSUE_NUMBER: process.env.GH_AW_GITHUB_EVENT_ISSUE_NUMBER,
              GH_AW_GITHUB_EVENT_PULL_REQUEST_NUMBER: process.env.GH_AW_GITHUB_EVENT_PULL_REQUEST_NUMBER,
              GH_AW_GITHUB_REPOSITORY: process.env.GH_AW_GITHUB_REPOSITORY,
              GH_AW_GITHUB_RUN_ID: process.env.GH_AW_GITHUB_RUN_ID,
              GH_AW_GITHUB_WORKSPACE: process.env.GH_AW_GITHUB_WORKSPACE,
              GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED: process.env.GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED
            }
          });
    - name: Validate prompt placeholders
      env:
        GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
      # poutine:ignore untrusted_checkout_exec
      run: bash "${RUNNER_TEMP}/gh-aw/actions/validate_prompt_placeholders.sh"
    - name: Print prompt
      env:
        GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
      # poutine:ignore untrusted_checkout_exec
      run: bash "${RUNNER_TEMP}/gh-aw/actions/print_prompt_summary.sh"
    - name: Upload activation artifact
      if: success()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.artifact-prefix.outputs.prefix }}activation
        path: |
          /tmp/gh-aw/aw_info.json
          /tmp/gh-aw/aw-prompts/prompt.txt
          /tmp/gh-aw/github_rate_limits.jsonl
        if-no-files-found: ignore
        retention-days: 1

  agent:
    needs: activation
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_AW_ASSETS_ALLOWED_EXTS: ""
      GH_AW_ASSETS_BRANCH: ""
      GH_AW_ASSETS_MAX_SIZE_KB: 0
      GH_AW_MCP_LOG_DIR: /tmp/gh-aw/mcp-logs/safeoutputs
      GH_AW_WORKFLOW_ID_SANITIZED: ghawestcprbuildkiteflakytestreporter
    outputs:
      agentic_engine_timeout: ${{ steps.detect-copilot-errors.outputs.agentic_engine_timeout || 'false' }}
      artifact_prefix: ${{ needs.activation.outputs.artifact_prefix }}
      checkout_pr_success: ${{ steps.checkout-pr.outputs.checkout_pr_success || 'true' }}
      effective_tokens: ${{ steps.parse-mcp-gateway.outputs.effective_tokens }}
      has_patch: ${{ steps.collect_output.outputs.has_patch }}
      inference_access_error: ${{ steps.detect-copilot-errors.outputs.inference_access_error || 'false' }}
      mcp_policy_error: ${{ steps.detect-copilot-errors.outputs.mcp_policy_error || 'false' }}
      model: ${{ needs.activation.outputs.model }}
      model_not_supported_error: ${{ steps.detect-copilot-errors.outputs.model_not_supported_error || 'false' }}
      output: ${{ steps.collect_output.outputs.output }}
      output_types: ${{ steps.collect_output.outputs.output_types }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
    - name: Setup Scripts
      id: setup
      uses: github/gh-aw/actions/setup@ce1794953e0ec42adc41b6fca05e02ab49ee21c3 # v0.68.3
      with:
        destination: ${{ runner.temp }}/gh-aw/actions
        job-name: ${{ github.job }}
        trace-id: ${{ needs.activation.outputs.setup-trace-id }}
    - name: Set runtime paths
      id: set-runtime-paths
      run: |
        {
          echo "GH_AW_SAFE_OUTPUTS=${RUNNER_TEMP}/gh-aw/safeoutputs/outputs.jsonl"
          echo "GH_AW_SAFE_OUTPUTS_CONFIG_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/config.json"
          echo "GH_AW_SAFE_OUTPUTS_TOOLS_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/tools.json"
        } >> "$GITHUB_OUTPUT"
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Create gh-aw temp directory
      run: bash "${RUNNER_TEMP}/gh-aw/actions/create_gh_aw_tmp_dir.sh"
    - name: Configure gh CLI for GitHub Enterprise
      run: bash "${RUNNER_TEMP}/gh-aw/actions/configure_gh_for_ghe.sh"
      env:
        GH_TOKEN: ${{ github.token }}
    - if: hashFiles('go.mod') != ''
      name: Setup Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        cache: true
        go-version-file: go.mod
    - if: hashFiles('.python-version') != ''
      name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version-file: .python-version
    - if: hashFiles('.node-version') != ''
      name: Setup Node.js (.node-version)
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version-file: .node-version
    - if: hashFiles('.node-version') == '' && hashFiles('.nvmrc') != ''
      name: Setup Node.js (.nvmrc)
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version-file: .nvmrc
    - if: hashFiles('.ruby-version') != ''
      name: Setup Ruby
      uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
      with:
        bundler-cache: true
        ruby-version: .ruby-version
    - id: setup-uv
      if: hashFiles('pyproject.toml', 'uv.lock') != ''
      name: Setup uv
      uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
    - env:
        UV_PATH: ${{ steps.setup-uv.outputs.uv-path }}
      if: hashFiles('pyproject.toml', 'uv.lock') != ''
      name: Expose uv in workspace
      run: "set -euo pipefail\n# AWF-friendly location: gh-aw scans /opt/hostedtoolcache/**/bin paths.\ntoolcache_bin=\"/opt/hostedtoolcache/gh-aw-tools/current/x64/bin\"\nsudo mkdir -p \"$toolcache_bin\"\nsudo ln -sf \"$UV_PATH\" \"$toolcache_bin/uv\"\n"
      shell: bash
    - name: Configure Copilot CLI settings
      run: "set -euo pipefail\nmkdir -p ~/.copilot\nCONFIG=\"$HOME/.copilot/config.json\"\nif [ -f \"$CONFIG\" ]; then\n    jq '. + {\"chat.customAgentInSubagent.enabled\": true}' \"$CONFIG\" > \"$CONFIG.tmp\" && mv \"$CONFIG.tmp\" \"$CONFIG\"\nelse\n    echo '{\"chat.customAgentInSubagent.enabled\":true}' > \"$CONFIG\"\nfi\n"
      shell: bash
    - env:
        GITHUB_REPOSITORY: ${{ github.repository }}
      name: Fetch repository conventions
      run: "set -euo pipefail\nif [ -f \"AGENTS.md\" ]; then\n  cp AGENTS.md /tmp/agents.md\n  echo \"Repository conventions copied from AGENTS.md to /tmp/agents.md\"\nelse\n  OWNER=\"${GITHUB_REPOSITORY%/*}\"\n  REPO=\"${GITHUB_REPOSITORY#*/}\"\n  summary=$(curl -sf --max-time 15 -X POST https://agents-md-generator.fastmcp.app/mcp \\\n    -H \"Content-Type: application/json\" \\\n    -H \"Accept: application/json, text/event-stream\" \\\n    -d \"{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"id\\\":1,\\\"method\\\":\\\"tools/call\\\",\\\"params\\\":{\\\"name\\\":\\\"generate_agents_md\\\",\\\"arguments\\\":{\\\"owner\\\":\\\"${OWNER}\\\",\\\"repo\\\":\\\"${REPO}\\\"}}}\" \\\n    | sed 's/^data: //' \\\n    | jq -r '.result.structuredContent.summary // empty' 2>/dev/null) || true\n  if [ -n \"$summary\" ]; then\n    echo \"$summary\" > /tmp/agents.md\n    echo \"Repository conventions written to /tmp/agents.md\"\n  else\n    echo \"::warning::Could not fetch repository conventions; continuing without them\"\n  fi\nfi"
      shell: bash
    - env:
        BK_ORG_INPUT: ${{ inputs.buildkite-org }}
        BK_PIPELINE_INPUT: ${{ inputs.buildkite-pipeline }}
        BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        TRIGGER_MODE: ${{ inputs.trigger-mode }}
      name: Detect flaky tests in Buildkite build
      run: "python3 - << 'PYEOF'\nimport json, os, re, subprocess, sys, urllib.parse, urllib.request\nimport xml.etree.ElementTree as ET\nfrom collections import defaultdict\n\nBK_TOKEN = os.environ['BUILDKITE_API_TOKEN']\nEVENT_NAME = os.environ['GITHUB_EVENT_NAME']\nTRIGGER_MODE = os.environ.get('TRIGGER_MODE', 'check_run').strip()\nBK_ORG_INPUT = os.environ.get('BK_ORG_INPUT', '').strip()\nBK_PIPELINE_INPUT = os.environ.get('BK_PIPELINE_INPUT', '').strip()\nARTIFACT_LIMIT_PER_JOB = 30\nMAX_FLAKY_TESTS = 100\nERR_TRUNC = 500\nBK_URL_RE = re.compile(r'https://buildkite\\.com/([^/]+)/([^/]+)/builds/(\\d+)')\n\nOUT_DIR = '/tmp/gh-aw/flaky'\nos.makedirs(OUT_DIR, exist_ok=True)\n\ndef bk_get(path):\n    url = f'https://api.buildkite.com/v2/{path}'\n    req = urllib.request.Request(url, headers={'Authorization': f'Bearer {BK_TOKEN}'})\n    with urllib.request.urlopen(req) as r:\n        return json.load(r)\n\ndef bk_download(url):\n    req = urllib.request.Request(url, headers={'Authorization': f'Bearer {BK_TOKEN}'})\n    with urllib.request.urlopen(req) as r:\n        return r.read()\n\ndef skip(reason):\n    subprocess.run(['bash', '-c', f'echo \"::notice::{reason}\"'], check=False)\n    print(reason)\n    sys.exit(0)\n\ndef fail(reason):\n    print(f'::error::{reason}')\n    sys.exit(1)\n\nif TRIGGER_MODE not in ('check_run', 'pull_request'):\n    fail(f\"Unsupported trigger-mode '{TRIGGER_MODE}'. Must be 'check_run' or 'pull_request'.\")\n\nwith open(os.environ['GITHUB_EVENT_PATH']) as f:\n    event = json.load(f)\n\nif TRIGGER_MODE == 'check_run':\n    if EVENT_NAME != 'check_run':\n        fail(f\"trigger-mode='check_run' but received '{EVENT_NAME}' event. Configure the trigger to fire on 'check_run' or switch trigger-mode to 'pull_request'.\")\n    cr = event.get('check_run') or {}\n    commit_sha = cr.get('head_sha', '')\n    target_url = cr.get('details_url', '')\n    m = BK_URL_RE.search(target_url)\n    if not m:\n        skip(f'No Buildkite build URL in details_url: {target_url}')\n    bk_org, bk_pipeline, bk_number = m.group(1), m.group(2), m.group(3)\nelse:  # pull_request\n    if EVENT_NAME != 'pull_request':\n        fail(f\"trigger-mode='pull_request' but received '{EVENT_NAME}' event. Configure the trigger to fire on 'pull_request' or switch trigger-mode to 'check_run'.\")\n    if not BK_ORG_INPUT or not BK_PIPELINE_INPUT:\n        fail(\"trigger-mode='pull_request' requires both buildkite-org and buildkite-pipeline inputs.\")\n    pr_event = event.get('pull_request') or {}\n    head = pr_event.get('head') or {}\n    head_sha = head.get('sha', '')\n    head_ref = head.get('ref', '')\n    head_user = ((head.get('user') or {}).get('login')) or ''\n    if not head_ref:\n        fail('pull_request payload has no head.ref; cannot resolve Buildkite build.')\n    # Buildkite stores PR-build branches as `<head_user>:<head_ref>` (e.g.\n    # `elastic:ci/flaky-test-reporter`, `someuser:feature/x` for forks).\n    # Query both the prefixed form and the bare ref via the array filter.\n    candidates = []\n    if head_user:\n        candidates.append(f'{head_user}:{head_ref}')\n    candidates.append(head_ref)\n    bk_org = BK_ORG_INPUT\n    bk_pipeline = BK_PIPELINE_INPUT\n    query = '&'.join(\n        f'branch[]={urllib.parse.quote(b, safe=\"\")}' for b in candidates\n    ) + '&state[]=passed&state[]=failed&per_page=10'\n    try:\n        builds = bk_get(f'organizations/{bk_org}/pipelines/{bk_pipeline}/builds?{query}')\n    except Exception as e:\n        skip(f'Failed to list Buildkite builds for branch {head_ref}: {e}')\n    if not builds:\n        skip(f'No finished Buildkite builds for branch candidates {candidates} in pipeline {bk_org}/{bk_pipeline}; skipping.')\n    # Prefer a build for a commit other than the just-pushed HEAD (i.e. the previous push).\n    # If only the HEAD's build exists, use it.\n    prior = [b for b in builds if b.get('commit') and b.get('commit') != head_sha]\n    selected = prior[0] if prior else builds[0]\n    sel_url = selected.get('web_url', '')\n    sm = BK_URL_RE.search(sel_url)\n    if not sm:\n        skip(f'Selected Buildkite build has no parseable web_url: {sel_url}')\n    bk_number = sm.group(3)\n    commit_sha = selected.get('commit') or head_sha\n    # Reconstruct the canonical build URL via the regex match so downstream code is uniform.\n    m = sm\n\nbuild = bk_get(f'organizations/{bk_org}/pipelines/{bk_pipeline}/builds/{bk_number}')\n\npr_info = build.get('pull_request') or {}\npr_number = pr_info.get('id', '')\nbranch = build.get('branch', '')\nif not pr_number and TRIGGER_MODE == 'pull_request':\n    pr_number = (event.get('pull_request') or {}).get('number', '')\n\nif not pr_number:\n    skip('Build is not associated with a PR; skipping')\n\nif build['state'] in ('running', 'scheduled', 'creating', 'started'):\n    skip(f'Build still in progress (state: {build[\"state\"]}); skipping')\n\ndef collect_jobs(build_data, pipeline_slug, build_url, depth=0):\n    out = []\n    if depth > 3:\n        return out\n    for job in build_data.get('jobs', []):\n        if job.get('type') == 'script':\n            out.append((pipeline_slug, build_url, job))\n        elif job.get('type') == 'trigger':\n            triggered = job.get('triggered_build') or {}\n            child_url = triggered.get('web_url', '')\n            cm = BK_URL_RE.search(child_url)\n            if cm:\n                try:\n                    child = bk_get(f'organizations/{cm.group(1)}/pipelines/{cm.group(2)}/builds/{cm.group(3)}')\n                    out.extend(collect_jobs(child, cm.group(2), child_url, depth + 1))\n                except Exception as e:\n                    print(f'Failed to fetch child build {child_url}: {e}')\n    return out\n\nall_jobs = collect_jobs(build, bk_pipeline, m.group(0))\n\ngroups = defaultdict(list)\nfor ps, bu, job in all_jobs:\n    key = (ps, bu, job.get('step_key') or job.get('name') or job['id'])\n    groups[key].append(job)\n\nflaky_chains = []\nfor key, jobs in groups.items():\n    if len(jobs) < 2:\n        continue\n    jobs_sorted = sorted(jobs, key=lambda j: j.get('created_at') or '')\n    earlier_failed = any(j.get('state') in ('failed', 'timed_out') for j in jobs_sorted[:-1])\n    last_passed = jobs_sorted[-1].get('state') == 'passed'\n    if earlier_failed and last_passed:\n        flaky_chains.append((key, jobs_sorted))\n\nflaky_tests = []\nseen_tests = set()\n\ndef add_test(classname, name, error, job_name, pipeline, build_url, job_web_url):\n    if len(flaky_tests) >= MAX_FLAKY_TESTS:\n        return\n    k = (classname, name)\n    if k in seen_tests:\n        return\n    seen_tests.add(k)\n    flaky_tests.append({\n        'classname': classname,\n        'test': name,\n        'error': (error or '')[:ERR_TRUNC],\n        'job': job_name,\n        'pipeline': pipeline,\n        'build_url': build_url,\n        'job_web_url': job_web_url,\n    })\n\nfor (ps, bu, name), chain in flaky_chains:\n    bm = BK_URL_RE.search(bu)\n    if not bm:\n        continue\n    for failed_job in chain[:-1]:\n        if failed_job.get('state') not in ('failed', 'timed_out'):\n            continue\n        try:\n            artifacts = bk_get(\n                f'organizations/{bm.group(1)}/pipelines/{bm.group(2)}/builds/{bm.group(3)}/jobs/{failed_job[\"id\"]}/artifacts'\n            )\n        except Exception as e:\n            print(f'Failed to list artifacts for job {failed_job[\"id\"]}: {e}')\n            continue\n        xml_artifacts = [a for a in artifacts if re.search(r'TEST-.*\\.xml$', a.get('path', ''))]\n        for artifact in xml_artifacts[:ARTIFACT_LIMIT_PER_JOB]:\n            try:\n                xml_data = bk_download(artifact['download_url'])\n            except Exception as e:\n                print(f'Failed to download {artifact[\"path\"]}: {e}')\n                continue\n            try:\n                root = ET.fromstring(xml_data)\n            except ET.ParseError as e:\n                print(f'Failed to parse {artifact[\"path\"]}: {e}')\n                continue\n            for tc in root.iter('testcase'):\n                failure = tc.find('failure')\n                if failure is None:\n                    failure = tc.find('error')\n                if failure is None:\n                    continue\n                msg = failure.get('message') or (failure.text or '').strip()\n                add_test(\n                    tc.get('classname', ''),\n                    tc.get('name', ''),\n                    msg,\n                    name,\n                    ps,\n                    bu,\n                    failed_job.get('web_url', ''),\n                )\n\nTEMPLATE_PATH = '.github/ISSUE_TEMPLATE/flaky-test.yml'\ngh_token = os.environ.get('GH_TOKEN', '')\ntemplate_fetched = False\nif gh_token:\n    try:\n        req = urllib.request.Request(\n            f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/contents/{TEMPLATE_PATH}',\n            headers={\n                'Authorization': f'Bearer {gh_token}',\n                'Accept': 'application/vnd.github.raw',\n                'User-Agent': 'gh-aw-flaky-test-reporter',\n            },\n        )\n        with urllib.request.urlopen(req) as r:\n            template_yaml = r.read().decode('utf-8', errors='replace')\n        with open(f'{OUT_DIR}/issue-template.yml', 'w') as f:\n            f.write(template_yaml)\n        template_fetched = True\n        print(f'Fetched issue template: {TEMPLATE_PATH}')\n    except Exception as e:\n        print(f'No issue template at {TEMPLATE_PATH}: {e}')\n\npr_head_sha = ''\nanalyzed_is_pr_head = True\nif TRIGGER_MODE == 'pull_request':\n    pr_head_sha = (event.get('pull_request') or {}).get('head', {}).get('sha', '')\n    analyzed_is_pr_head = (commit_sha == pr_head_sha)\n\nwith open(f'{OUT_DIR}/event.txt', 'w') as f:\n    f.write(f'event_name: {EVENT_NAME}\\n')\n    f.write(f'trigger_mode: {TRIGGER_MODE}\\n')\n    f.write(f'commit_sha: {commit_sha}\\n')\n    f.write(f'build_url: {m.group(0)}\\n')\n    f.write(f'pipeline: {bk_pipeline}\\n')\n    f.write(f'branch: {branch}\\n')\n    f.write(f'pr_number: {pr_number}\\n')\n    f.write(f'build_state: {build[\"state\"]}\\n')\n    f.write(f'template_fetched: {str(template_fetched).lower()}\\n')\n    if TRIGGER_MODE == 'pull_request':\n        f.write(f'pr_head_sha: {pr_head_sha}\\n')\n        f.write(f'analyzed_is_pr_head: {str(analyzed_is_pr_head).lower()}\\n')\n\ndata = {\n    'pr_number': pr_number,\n    'branch': branch,\n    'commit_sha': commit_sha,\n    'build_url': m.group(0),\n    'pipeline': bk_pipeline,\n    'build_state': build['state'],\n    'flaky_jobs': [\n        {\n            'name': key[2],\n            'pipeline': key[0],\n            'build_url': key[1],\n            'attempts': [\n                {'id': j['id'], 'state': j.get('state'), 'web_url': j.get('web_url'), 'created_at': j.get('created_at')}\n                for j in chain\n            ],\n        }\n        for key, chain in flaky_chains\n    ],\n    'flaky_tests': flaky_tests,\n}\nwith open(f'{OUT_DIR}/flaky.json', 'w') as f:\n    json.dump(data, f, indent=2)\n\nlines = [\n    f'## Build: {m.group(0)}',\n    f'Pipeline: {bk_pipeline}  State: {build[\"state\"]}',\n    f'PR: #{pr_number}  Branch: {branch}',\n    f'Flaky job chains (failed then passed on retry): {len(flaky_chains)}',\n    f'Flaky tests parsed from JUnit XML: {len(flaky_tests)}',\n    '',\n]\nif flaky_chains:\n    lines.append('### Flaky job chains')\n    for (ps, bu, jn), chain in flaky_chains:\n        lines.append(f'- **{jn}** (pipeline: `{ps}`, build: {bu})')\n        for j in chain:\n            lines.append(f'  - attempt `{j[\"id\"]}` state=`{j.get(\"state\")}` url={j.get(\"web_url\")}')\n    lines.append('')\nif flaky_tests:\n    lines.append('### Flaky tests (failed on first attempt, passed on retry)')\n    for ft in flaky_tests:\n        tn = f'`{ft[\"classname\"]}.{ft[\"test\"]}`' if ft['classname'] else f'`{ft[\"test\"]}`'\n        lines.append(f'- {tn} (job: {ft[\"job\"]})')\n        if ft['error']:\n            one_line = ft['error'].replace('\\n', ' ').strip()[:200]\n            lines.append(f'  - error: {one_line}')\n\nwith open(f'{OUT_DIR}/summary.md', 'w') as f:\n    f.write('\\n'.join(lines))\n\nprint('\\n'.join(lines))\n\nif not flaky_chains:\n    print('No flaky job chains detected; agent should call noop.')\nPYEOF\n"
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SETUP_COMMANDS: ${{ inputs.setup-commands }}
      if: ${{ inputs.setup-commands != '' }}
      name: Repo-specific setup
      run: eval "$SETUP_COMMANDS"

    - name: Configure Git credentials
      env:
        REPO_NAME: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git config --global am.keepcr true
        # Re-authenticate git with GitHub token
        SERVER_URL_STRIPPED="${SERVER_URL#https://}"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
        echo "Git configured with standard GitHub Actions identity"
    - name: Checkout PR branch
      id: checkout-pr
      if: |
        github.event.pull_request || github.event.issue.pull_request
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/checkout_pr_branch.cjs');
          await main();
    - name: Install GitHub Copilot CLI
      run: bash "${RUNNER_TEMP}/gh-aw/actions/install_copilot_cli.sh" 1.0.21
      env:
        GH_HOST: github.com
    - name: Install AWF binary
      run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.25.20
    - name: Determine automatic lockdown mode for GitHub MCP Server
      id: determine-automatic-lockdown
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_GITHUB_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        GH_AW_GITHUB_MCP_SERVER_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN }}
      with:
        script: |
          const determineAutomaticLockdown = require('${{ runner.temp }}/gh-aw/actions/determine_automatic_lockdown.cjs');
          await determineAutomaticLockdown(github, context, core);
    - name: Download container images
      run: bash "${RUNNER_TEMP}/gh-aw/actions/download_docker_images.sh" ghcr.io/github/gh-aw-firewall/agent:0.25.20 ghcr.io/github/gh-aw-firewall/api-proxy:0.25.20 ghcr.io/github/gh-aw-firewall/squid:0.25.20 ghcr.io/github/gh-aw-mcpg:v0.2.19 ghcr.io/github/github-mcp-server:v0.32.0 node:lts-alpine
    - name: Write Safe Outputs Config
      run: |
        mkdir -p "${RUNNER_TEMP}/gh-aw/safeoutputs"
        mkdir -p /tmp/gh-aw/safeoutputs
        mkdir -p /tmp/gh-aw/mcp-logs/safeoutputs
        cat > "${RUNNER_TEMP}/gh-aw/safeoutputs/config.json" << 'GH_AW_SAFE_OUTPUTS_CONFIG_7d1d6ef21cf14d9a_EOF'
        {"add_comment":{"max":10,"target":"*"},"create_issue":{"labels":["${{ inputs.flaky-test-label }}"],"max":5,"title_prefix":"${{ inputs.title-prefix }}"},"create_report_incomplete_issue":{},"missing_data":{},"missing_tool":{},"noop":{"max":1,"report-as-issue":"true"},"report_incomplete":{}}
        GH_AW_SAFE_OUTPUTS_CONFIG_7d1d6ef21cf14d9a_EOF

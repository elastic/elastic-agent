      with:
        destination: ${{ runner.temp }}/gh-aw/actions
        job-name: ${{ github.job }}
        trace-id: ${{ needs.activation.outputs.setup-trace-id }}
    - name: Download agent output artifact
      id: download-agent-output
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ needs.activation.outputs.artifact_prefix }}agent
        path: /tmp/gh-aw/
    - name: Setup agent output environment variable
      id: setup-agent-output-env
      if: steps.download-agent-output.outcome == 'success'
      run: |
        mkdir -p /tmp/gh-aw/
        find "/tmp/gh-aw/" -type f -print
        echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
    - name: Process no-op messages
      id: noop
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
        GH_AW_NOOP_MAX: "1"
        GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
        GH_AW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GH_AW_AGENT_CONCLUSION: ${{ needs.agent.result }}
        GH_AW_NOOP_REPORT_AS_ISSUE: "true"
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/handle_noop_message.cjs');
          await main();
    - name: Log detection run
      id: detection_runs
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
        GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
        GH_AW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
        GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/handle_detection_runs.cjs');
          await main();
    - name: Record missing tool
      id: missing_tool
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
        GH_AW_MISSING_TOOL_CREATE_ISSUE: "true"
        GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/missing_tool.cjs');
          await main();
    - name: Record incomplete
      id: report_incomplete
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
        GH_AW_REPORT_INCOMPLETE_CREATE_ISSUE: "true"
        GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/report_incomplete_handler.cjs');
          await main();
    - name: Handle agent failure
      id: handle_agent_failure
      if: always()
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
        GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
        GH_AW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GH_AW_AGENT_CONCLUSION: ${{ needs.agent.result }}
        GH_AW_WORKFLOW_ID: "gh-aw-estc-pr-buildkite-flaky-test-reporter"
        GH_AW_ENGINE_ID: "copilot"
        GH_AW_SECRET_VERIFICATION_RESULT: ${{ needs.activation.outputs.secret_verification_result }}
        GH_AW_CHECKOUT_PR_SUCCESS: ${{ needs.agent.outputs.checkout_pr_success }}
        GH_AW_INFERENCE_ACCESS_ERROR: ${{ needs.agent.outputs.inference_access_error }}
        GH_AW_MCP_POLICY_ERROR: ${{ needs.agent.outputs.mcp_policy_error }}
        GH_AW_AGENTIC_ENGINE_TIMEOUT: ${{ needs.agent.outputs.agentic_engine_timeout }}
        GH_AW_MODEL_NOT_SUPPORTED_ERROR: ${{ needs.agent.outputs.model_not_supported_error }}
        GH_AW_LOCKDOWN_CHECK_FAILED: ${{ needs.activation.outputs.lockdown_check_failed }}
        GH_AW_STALE_LOCK_FILE_FAILED: ${{ needs.activation.outputs.stale_lock_file_failed }}
        GH_AW_SAFE_OUTPUT_MESSAGES: "{\"footer\":\"${{ inputs.messages-footer || format('---\\n[What is this?](https://ela.st/github-ai-tools) | [From workflow: {0}]({{run_url}})\\n\\nGive us feedback! React with 🚀 if perfect, 👍 if helpful, 👎 if not.', github.workflow) }}\",\"activationComments\":\"false\"}"
        GH_AW_GROUP_REPORTS: "false"
        GH_AW_FAILURE_REPORT_AS_ISSUE: "true"
        GH_AW_TIMEOUT_MINUTES: "30"
      with:
        github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/handle_agent_failure.cjs');
          await main();

  detection:
    needs:
    - activation
    - agent
    if: >
      always() && needs.agent.result != 'skipped' && (needs.agent.outputs.output_types != '' || needs.agent.outputs.has_patch == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      detection_conclusion: ${{ steps.detection_conclusion.outputs.conclusion }}
      detection_reason: ${{ steps.detection_conclusion.outputs.reason }}
      detection_success: ${{ steps.detection_conclusion.outputs.success }}
    steps:
    - name: Setup Scripts
      id: setup
      uses: github/gh-aw/actions/setup@ce1794953e0ec42adc41b6fca05e02ab49ee21c3 # v0.68.3
      with:
        destination: ${{ runner.temp }}/gh-aw/actions
        job-name: ${{ github.job }}
        trace-id: ${{ needs.activation.outputs.setup-trace-id }}
    - name: Download agent output artifact
      id: download-agent-output
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ needs.agent.outputs.artifact_prefix }}agent
        path: /tmp/gh-aw/
    - name: Setup agent output environment variable
      id: setup-agent-output-env
      if: steps.download-agent-output.outcome == 'success'
      run: |
        mkdir -p /tmp/gh-aw/
        find "/tmp/gh-aw/" -type f -print
        echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
    - name: Checkout repository for patch context
      if: needs.agent.outputs.has_patch == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    # --- Threat Detection ---
    - name: Clean stale firewall files from agent artifact
      run: |
        rm -rf /tmp/gh-aw/sandbox/firewall/logs
        rm -rf /tmp/gh-aw/sandbox/firewall/audit
    - name: Download container images
      run: bash "${RUNNER_TEMP}/gh-aw/actions/download_docker_images.sh" ghcr.io/github/gh-aw-firewall/agent:0.25.20 ghcr.io/github/gh-aw-firewall/api-proxy:0.25.20 ghcr.io/github/gh-aw-firewall/squid:0.25.20
    - name: Check if detection needed
      id: detection_guard
      if: always()
      env:
        OUTPUT_TYPES: ${{ needs.agent.outputs.output_types }}
        HAS_PATCH: ${{ needs.agent.outputs.has_patch }}
      run: |
        if [[ -n "$OUTPUT_TYPES" || "$HAS_PATCH" == "true" ]]; then
          echo "run_detection=true" >> "$GITHUB_OUTPUT"
          echo "Detection will run: output_types=$OUTPUT_TYPES, has_patch=$HAS_PATCH"
        else
          echo "run_detection=false" >> "$GITHUB_OUTPUT"
          echo "Detection skipped: no agent outputs or patches to analyze"
        fi
    - name: Clear MCP configuration for detection
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      run: |
        rm -f /tmp/gh-aw/mcp-config/mcp-servers.json
        rm -f /home/runner/.copilot/mcp-config.json
        rm -f "$GITHUB_WORKSPACE/.gemini/settings.json"
    - name: Prepare threat detection files
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      run: |
        mkdir -p /tmp/gh-aw/threat-detection/aw-prompts
        cp /tmp/gh-aw/aw-prompts/prompt.txt /tmp/gh-aw/threat-detection/aw-prompts/prompt.txt 2>/dev/null || true
        cp /tmp/gh-aw/agent_output.json /tmp/gh-aw/threat-detection/agent_output.json 2>/dev/null || true
        for f in /tmp/gh-aw/aw-*.patch; do
          [ -f "$f" ] && cp "$f" /tmp/gh-aw/threat-detection/ 2>/dev/null || true
        done
        for f in /tmp/gh-aw/aw-*.bundle; do
          [ -f "$f" ] && cp "$f" /tmp/gh-aw/threat-detection/ 2>/dev/null || true
        done
        echo "Prepared threat detection files:"
        ls -la /tmp/gh-aw/threat-detection/ 2>/dev/null || true
    - name: Setup threat detection
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
        WORKFLOW_DESCRIPTION: "Detect and report flaky tests from Buildkite PR builds"
        HAS_PATCH: ${{ needs.agent.outputs.has_patch }}
      with:
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/setup_threat_detection.cjs');
          await main();
    - name: Ensure threat-detection directory and log
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      run: |
        mkdir -p /tmp/gh-aw/threat-detection
        touch /tmp/gh-aw/threat-detection/detection.log
    - name: Install GitHub Copilot CLI
      run: bash "${RUNNER_TEMP}/gh-aw/actions/install_copilot_cli.sh" 1.0.21
      env:
        GH_HOST: github.com
    - name: Install AWF binary
      run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.25.20
    - name: Execute GitHub Copilot CLI
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      id: detection_agentic_execution
      # Copilot CLI tool arguments (sorted):
      timeout-minutes: 20
      run: |
        set -o pipefail
        touch /tmp/gh-aw/agent-step-summary.md
        (umask 177 && touch /tmp/gh-aw/threat-detection/detection.log)
        # shellcheck disable=SC1003
        sudo -E awf --container-workdir "${GITHUB_WORKSPACE}" --mount "${RUNNER_TEMP}/gh-aw:${RUNNER_TEMP}/gh-aw:ro" --mount "${RUNNER_TEMP}/gh-aw:/host${RUNNER_TEMP}/gh-aw:ro" --env-all --exclude-env COPILOT_GITHUB_TOKEN --allow-domains api.business.githubcopilot.com,api.enterprise.githubcopilot.com,api.github.com,api.githubcopilot.com,api.individual.githubcopilot.com,github.com,host.docker.internal,telemetry.enterprise.githubcopilot.com --log-level info --proxy-logs-dir /tmp/gh-aw/sandbox/firewall/logs --audit-dir /tmp/gh-aw/sandbox/firewall/audit --enable-host-access --image-tag 0.25.20 --skip-pull --enable-api-proxy \
          -- /bin/bash -c 'node ${RUNNER_TEMP}/gh-aw/actions/copilot_driver.cjs /usr/local/bin/copilot --add-dir /tmp/gh-aw/ --log-level all --log-dir /tmp/gh-aw/sandbox/agent/logs/ --disable-builtin-mcps --no-ask-user --allow-all-tools --add-dir "${GITHUB_WORKSPACE}" --prompt "$(cat /tmp/gh-aw/aw-prompts/prompt.txt)"' 2>&1 | tee -a /tmp/gh-aw/threat-detection/detection.log
      env:
        COPILOT_AGENT_RUNNER_TYPE: STANDALONE
        COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        COPILOT_MODEL: ${{ inputs.model }}
        GH_AW_PHASE: detection
        GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        GH_AW_VERSION: dev
        GITHUB_API_URL: ${{ github.api_url }}
        GITHUB_AW: true
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_STEP_SUMMARY: /tmp/gh-aw/agent-step-summary.md
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        XDG_CONFIG_HOME: /home/runner
    - name: Upload threat detection log
      if: always() && steps.detection_guard.outputs.run_detection == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ needs.agent.outputs.artifact_prefix }}detection
        path: /tmp/gh-aw/threat-detection/detection.log
        if-no-files-found: ignore
    - name: Parse and conclude threat detection
      id: detection_conclusion
      if: always()
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        RUN_DETECTION: ${{ steps.detection_guard.outputs.run_detection }}
        GH_AW_DETECTION_CONTINUE_ON_ERROR: "true"
      with:
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/parse_threat_detection_results.cjs');
          await main();

  pre_activation:
    runs-on: ubuntu-slim
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' }}
      matched_command: ''
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
    - name: Setup Scripts
      id: setup
      uses: github/gh-aw/actions/setup@ce1794953e0ec42adc41b6fca05e02ab49ee21c3 # v0.68.3
      with:
        destination: ${{ runner.temp }}/gh-aw/actions
        job-name: ${{ github.job }}
    - name: Check team membership for workflow
      id: check_membership
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:
        GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        GH_AW_ALLOWED_BOTS: "${{ inputs.allowed-bot-users }},buildkite-limited-access[bot]"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
          setupGlobals(core, github, context, exec, io, getOctokit);
          const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
          await main();

  safe_outputs:
    needs:
    - activation
    - agent
    - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/gh-aw-estc-pr-buildkite-flaky-test-reporter"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "copilot"
      GH_AW_ENGINE_MODEL: "${{ inputs.model }}"
      GH_AW_SAFE_OUTPUT_MESSAGES: "{\"footer\":\"${{ inputs.messages-footer || format('---\\n[What is this?](https://ela.st/github-ai-tools) | [From workflow: {0}]({{run_url}})\\n\\nGive us feedback! React with 🚀 if perfect, 👍 if helpful, 👎 if not.', github.workflow) }}\",\"activationComments\":\"false\"}"
      GH_AW_WORKFLOW_ID: "gh-aw-estc-pr-buildkite-flaky-test-reporter"
      GH_AW_WORKFLOW_NAME: "PR Buildkite Flaky Test Reporter"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      comment_id: ${{ steps.process_safe_outputs.outputs.comment_id }}
      comment_url: ${{ steps.process_safe_outputs.outputs.comment_url }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      created_issue_number: ${{ steps.process_safe_outputs.outputs.created_issue_number }}
      created_issue_url: ${{ steps.process_safe_outputs.outputs.created_issue_url }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
    - name: Setup Scripts
      id: setup
      uses: github/gh-aw/actions/setup@ce1794953e0ec42adc41b6fca05e02ab49ee21c3 # v0.68.3
      with:
        destination: ${{ runner.temp }}/gh-aw/actions
        job-name: ${{ github.job }}
        trace-id: ${{ needs.activation.outputs.setup-trace-id }}
    - name: Download agent output artifact
      id: download-agent-output
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ needs.activation.outputs.artifact_prefix }}agent
        path: /tmp/gh-aw/
    - name: Setup agent output environment variable
      id: setup-agent-output-env
      if: steps.download-agent-output.outcome == 'success'
      run: |
        mkdir -p /tmp/gh-aw/
        find "/tmp/gh-aw/" -type f -print
        echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
    - name: Configure GH_HOST for enterprise compatibility
      id: ghes-host-config
      shell: bash
      run: |
        # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
        # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
        GH_HOST="${GITHUB_SERVER_URL#https://}"
        GH_HOST="${GH_HOST#http://}"
        echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
    - name: Process Safe Outputs
      id: process_safe_outputs
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
      env:

name: "Sweeper: OTel Collector and Beats Receiver Integration"
on:
  schedule:
    - cron: "0 9 * * 3"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-code-quality-audit.lock.yml@v0
    with:
      title-prefix: "[otel-collector-integration]"
      severity-threshold: "high"
      setup-commands: |
        sudo apt-get update && sudo apt-get install -y libpcap-dev librpm-dev python3-venv
        export GOTOOLCHAIN=auto
        make mage
      additional-instructions: |
        You are an **OTel collector integration sweeper** for Elastic Agent. Your goal is to find
        every code path where the OTel collector subprocess can crash, lose data, misreport
        status, or receive incorrect configuration from the agent's translation layer — and
        write a failing test for each confirmed issue.

        ## The component

        Elastic Agent manages an OpenTelemetry Collector as a supervised subprocess. The
        integration code lives under `internal/pkg/otel/`:

        - `manager/manager.go` — OTel manager: receives config updates from the coordinator,
          starts/restarts the collector subprocess
        - `manager/execution.go` / `execution_subprocess.go` — Subprocess lifecycle, flags,
          health and metrics port assignment
        - `manager/healthcheck.go` — Probes the collector's health endpoint
        - `manager/recovery_backoff.go` — Restart backoff when the collector crashes
        - `translate/otelconfig.go` — Maps Elastic Agent component model → OTel Collector
          `confmap` configuration (receivers, exporters, processors, extensions, pipelines)
        - `translate/output_elasticsearch.go` — Maps Elasticsearch output settings (TLS,
          auth, retry, bulk) into OTel exporter config
        - `translate/status.go` — Maps OTel pipeline/receiver status back to agent runtime
          state (component names, beats receiver semantics)
        - `status/serializable.go` — Serializable aggregate status for agent reporting
        - `receivers/elasticmonitoring/` — Custom OTel receiver for internal monitoring telemetry
        - `extension/elasticdiagnostics/` — OTel extension for diagnostics

        ## The bug class

        This is the fastest-growing bug category in the repository (~40+ issues and climbing).
        The recurring failure modes are:

        **Config translation errors**: The translation from Elastic Agent's component model to
        OTel Collector config has many edge cases. Historical bugs include: TLS settings not
        mapped correctly (proxy_url type mismatch, missing CA paths), retry behavior not matching
        standalone beats (retry intervals, max_retries <= 0 handling), `service.telemetry` config
        not persisted or propagated to the collector subprocess, and output-specific settings
        silently dropped during translation. Each of these caused data loss or collector crashes
        in production.

        **Status reporting mismatch**: The agent reports component health based on the collector's
        status, but the mapping between OTel pipeline status and agent component status has
        produced bugs: extension status always appearing in output, beatsreceiver status persisting
        after unenroll, switching between process and otel runtime removing components from
        status output, and timestamps not being considered when comparing statuses (causing stale
        status to override current status).

        **Collector subprocess lifecycle**: The collector runs as a subprocess. Bugs have included:
        the collector not shutting down gracefully on Unix signals, defunct processes left behind
        when the agent re-execs itself, health check connections not being reused (opening a new
        connection per request), and the collector not being reloaded (vs restarted) when only
        config changes.

        **Data loss on error responses**: The Elasticsearch exporter in the OTel collector has
        had bugs where HTTP 413 errors caused data loss (entire batch dropped instead of split
        and retried), non-retriable errors were not retried, and the retry interval did not
        back off on repeated failures. These are subtle because the collector reports healthy
        while silently losing data.

        ## How to investigate

        Start with the translation layer (`translate/otelconfig.go`). Read how each Elastic
        Agent config field maps to the OTel config. For each field, ask: what happens when
        this field is missing? What happens when it has an unexpected type (string vs URL vs
        map)? What happens when the output type changes? Are there fields that the agent
        supports but the translation silently ignores?

        Then read the status mapping (`translate/status.go`). Follow how an OTel pipeline
        status event flows back to the coordinator. Ask: if two status updates arrive out of
        order, does the agent show the correct current state? If a component is removed from
        the config, does its status get cleaned up? If the collector reports healthy but an
        exporter is dropping data, does the agent know?

        For the subprocess lifecycle, read `manager/execution_subprocess.go`. Ask: what happens
        if the collector crashes immediately after starting? What if it crashes during a config
        reload? What if the agent is shut down while the collector is starting up? Are there
        race conditions between the health check and the subprocess exit?

        ## For each risk you confirm

        Write a Go test. For translation issues, create an Elastic Agent config and assert the
        OTel config output matches expectations. For status issues, simulate status events and
        assert the agent's aggregate state is correct. Run:
        `go test ./internal/pkg/otel/...`

        ## The bar for filing

        Only report findings that affect a real Elastic Agent deployment running with OTel
        components (managed or hybrid mode). The issue must be triggerable through normal
        operations: changing agent policy, restarting the agent, having the Elasticsearch
        cluster return errors, or having network interruptions. Do not file issues that require
        manipulating the OTel collector's internal state directly.

        ## Output

        File a single issue containing:
        - Confirmed issues with test code, the exact config or status scenario, and fix direction
        - A priority ranking: data-loss issues first, then status misreporting, then lifecycle
        - Translation fields you audited and found correctly mapped
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

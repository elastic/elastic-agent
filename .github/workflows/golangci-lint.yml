name: golangci-lint
on:
  push:
    # This is only here to establish a base cache and make the PR executions faster
    branches:
      - 'main'
      - '8.19'
      - '9.*'
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'
      - '.golangci-lint-version'
      - '.github/workflows/golangci-lint.yml'
  pull_request:
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'
      - '.golangci-lint-version'
      - '.github/workflows/golangci-lint.yml'
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
jobs:
  golangci:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        # golangci-lint only type-checks files whose build constraints are
        # satisfied by the active tag set, so a single run with no tags skips
        # every file gated behind a custom //go:build tag (integration tests,
        # requirefips, mage, kubernetes_inner, ...). We run it multiple times
        # with different tag sets to cover them all.
        #
        # "local" and "define" are mutually exclusive (pkg/testing/define
        # picks one file based on which of the two tags is set), so they need
        # separate runs; every other custom tag is additive and safe to
        # combine with both. The untagged run stays to cover files that
        # require *neither* "local" nor "define" to be set.
        tagset:
          - name: default
            tags: ''
          - name: local
            tags: 'integration,requirefips,kubernetes_inner,mage,local'
          - name: define
            tags: 'integration,requirefips,kubernetes_inner,mage,define'
    name: lint (${{ matrix.os }}, ${{ matrix.tagset.name }})
    runs-on: ${{  matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      - name: golangci-lint
        # Pin the full commit hash
        # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Read the version from .golangci-lint-version to keep local and CI in sync.
          version-file: .golangci-lint-version

          # Give the job more time to execute.
          # Regarding `--whole-files`, the linter is supposed to support linting of changed a patch only but,
          # for some reason, it's very unreliable this way - sometimes it does not report any or some
          # issues without linting the whole files, so we have to use `--whole-files`
          # which can lead to some frustration from developers who would like to
          # fix a single line in an existing codebase and the linter would force them
          # into fixing all linting issues in the whole file instead.
          args: --timeout=60m --whole-files --build-tags=${{ matrix.tagset.tags }}

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          only-new-issues: true

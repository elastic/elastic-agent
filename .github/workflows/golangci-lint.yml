name: golangci-lint
on:
  push:
    # This is only here to establish a base cache and make the PR executions faster
    branches:
      - 'main'
      - '8.19'
      - '9.*'
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'
      - '.golangci-lint-version'
      - '.github/workflows/golangci-lint.yml'
  pull_request:
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.golangci.yml'
      - '.golangci-lint-version'
      - '.github/workflows/golangci-lint.yml'
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
jobs:
  # Picks which build-tag sets to lint. A PR only runs the tagged sets when it
  # changes files those tags cover; pushes always run all of them. Keep the
  # tag sets in sync with buildTagSets in dev-tools/mage/lint.go.
  plan:
    name: plan tag sets
    runs-on: ubuntu-latest
    outputs:
      tagsets: ${{ steps.compute.outputs.tagsets }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      - id: compute
        shell: bash
        run: |
          set -euo pipefail

          default_set='{"name":"default","tags":""}'
          local_set='{"name":"local","tags":"integration,requirefips,kubernetes_inner,mage,local"}'
          define_set='{"name":"define","tags":"integration,requirefips,kubernetes_inner,mage,define"}'

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tagsets=[$default_set,$local_set,$define_set]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "$base_sha"...HEAD)"

          need_local=false
          need_define=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              go.mod|go.sum|.golangci.yml|.golangci-lint-version|.github/workflows/golangci-lint.yml)
                need_local=true
                need_define=true
                continue
                ;;
            esac
            case "$f" in
              *.go) ;;
              *) continue ;;
            esac
            [ -f "$f" ] || continue # deleted file: nothing new to lint there
            tag_line="$(grep -m1 '^//go:build' -- "$f" || true)"
            [ -z "$tag_line" ] && continue
            if echo "$tag_line" | grep -qE '\b(integration|requirefips|kubernetes_inner|mage)\b'; then
              need_local=true
              need_define=true
            fi
            echo "$tag_line" | grep -qE '\blocal\b' && need_local=true
            echo "$tag_line" | grep -qE '\bdefine\b' && need_define=true
          done <<< "$changed_files"

          sets="$default_set"
          [ "$need_local" = true ] && sets="$sets,$local_set"
          [ "$need_define" = true ] && sets="$sets,$define_set"
          echo "tagsets=[$sets]" >> "$GITHUB_OUTPUT"
          echo "Selected tag sets: [$sets]"

  golangci:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        tagset: ${{ fromJson(needs.plan.outputs.tagsets) }}
    name: lint (${{ matrix.os }}, ${{ matrix.tagset.name }})
    runs-on: ${{  matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      - name: golangci-lint
        # Pin the full commit hash
        # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Read the version from .golangci-lint-version to keep local and CI in sync.
          version-file: .golangci-lint-version

          # Give the job more time to execute.
          # Regarding `--whole-files`, the linter is supposed to support linting of changed a patch only but,
          # for some reason, it's very unreliable this way - sometimes it does not report any or some
          # issues without linting the whole files, so we have to use `--whole-files`
          # which can lead to some frustration from developers who would like to
          # fix a single line in an existing codebase and the linter would force them
          # into fixing all linting issues in the whole file instead.
          args: --timeout=60m --whole-files --build-tags=${{ matrix.tagset.tags }}

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          only-new-issues: true

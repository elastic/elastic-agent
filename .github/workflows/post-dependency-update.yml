# Follow-on actions for dependency update PRs (Dependabot and Renovate). Any changes to
# dependencies in go.mod require the NOTICE.txt and NOTICE-fips.txt files to be updated.
# This workflow applies those follow-on changes to the dependency update branch.
name: post-dependency-update

on:
  push:
    branches:
      - "dependabot/go_modules/**"
      - "renovate/**"

permissions:
  contents: read

jobs:
  update-notice:
    permissions:
      # Allow job to write to the branch.
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-go@v7
        with:
          go-version-file: .go-version

      - name: set up git user
        uses: elastic/oblt-actions/git/setup@v1
        with:
          username: 'github-actions[bot]'
          email: 'github-actions[bot]@users.noreply.github.com'

      - name: Install mage
        uses: magefile/mage-action@a662bd8c29d8106879588cfff83b2faf6e6f59db # v4.0.0
        with:
          version: v1.14.0
          install-only: true

      - name: Update EDOT go.mod if necessary
        run: cd internal/edot && go mod tidy

      - name: check for modified edot go.mod
        id: edot-check
        run: |
          if git diff --quiet HEAD -- internal/edot/go.mod; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: commit changed files
        if: steps.edot-check.outputs.modified == 'true'
        run: |
          git add internal/edot/go.mod internal/edot/go.sum
          git commit -m "Update EDOT go.mod"

      - name: Update archive-proxy go.mod if necessary
        run: cd wrapper/windows/archive-proxy && go mod tidy

      - name: check for modified archive-proxy go.mod
        id: archive-proxy-check
        run: |
          if git diff --quiet HEAD -- wrapper/windows/archive-proxy/go.mod; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: commit archive-proxy changed files
        if: steps.archive-proxy-check.outputs.modified == 'true'
        run: |
          git add wrapper/windows/archive-proxy/go.mod wrapper/windows/archive-proxy/go.sum
          git commit -m "Update archive-proxy go.mod"

      - name: update NOTICE.txt and NOTICE-fips.txt
        run: make notice

      - name: check for modified NOTICE.txt or NOTICE-fips.txt
        id: notice-check
        run: |
          if git diff --quiet HEAD -- NOTICE*.txt; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: commit NOTICE.txt and/or NOTICE-fips.txt
        if: steps.notice-check.outputs.modified == 'true'
        run: |
          git add NOTICE*.txt
          git commit -m "Update NOTICE.txt and/or NOTICE-fips.txt"

      - name: update otel README.md
        run: mage otel:readme

      - name: check for modified otel README.md
        id: otel-readme-check
        run: |
          if git diff --quiet HEAD -- internal/edot/README.md; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: commit otel README.md
        if: steps.otel-readme-check.outputs.modified == 'true'
        run: |
          git add internal/edot/README.md
          git commit -m "Update otel README.md"

      - name: regenerate mocks
        run: go tool mockery

      - name: format regenerated mocks
        run: mage fmt

      - name: check for modified mocks
        id: mocks-check
        run: |
          if git diff --quiet HEAD -- '*/mocks.go'; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: commit regenerated mocks
        if: steps.mocks-check.outputs.modified == 'true'
        run: |
          git add '*/mocks.go'
          git commit -m "Regenerate mocks"

      - name: Push added commits
        run: git push

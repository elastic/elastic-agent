---
name: bump-vm-images

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (diff instead of apply). Useful for testing without creating PRs.'
        type: boolean
        default: false
  schedule:
    # Since the CI Agent images are produced weekly on Saturday at 0am UTC
    # and we can only bump the version after the images are available
    # let's try on Saturday at 12:00 UTC.
    - cron: "0 12 * * 6"

permissions:
  contents: read

env:
  JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

jobs:
  filter:
    runs-on: ubuntu-slim
    timeout-minutes: 1
    outputs:
      matrix: ${{ steps.generator.outputs.matrix }}
    permissions:
      contents: read
    steps:
    - id: generator
      uses: elastic/oblt-actions/elastic/active-branches@v1
      with:
        filter-branches: true

  bump:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs:
      - filter
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.filter.outputs.matrix) }}
    steps:
      # First: checkout the default branch (main) to get the latest updatecli config.
      # This ensures we always use the most up-to-date config, even when bumping older branches
      # that may have stale or incorrect updatecli configurations.
      - uses: actions/checkout@v6

      - name: Save updatecli config from default branch
        run: cp .ci/updatecli/updatecli-bump-vm-images.yml /tmp/updatecli-bump-vm-images.yml

      # Second: checkout the target branch so the condition check (grep on pipeline.yml)
      # and any other local file reads use the branch's actual state.
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      # Restore the updatecli config from the default branch (main) to avoid failures
      # caused by stale configs on older branches (e.g. listing files that don't have Azure patterns).
      - name: Restore updatecli config from default branch
        run: cp /tmp/updatecli-bump-vm-images.yml .ci/updatecli/updatecli-bump-vm-images.yml

      - uses: elastic/oblt-actions/updatecli/run@v1
        with:
          command: ${{ inputs.dry-run && 'diff' || 'apply' }} --config .ci/updatecli/updatecli-bump-vm-images.yml --values .ci/updatecli/values.d/scm.yml
          version-file: .updatecli-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ matrix.branch }}

      - if: ${{ failure()  }}
        uses: elastic/oblt-actions/slack/send@v1
        with:
          bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: "#ingest-notifications"
          message: ":traffic_cone: updatecli failed for `${{ github.repository }}@${{ github.ref_name }}`[${{ matrix.branch }}], @robots-ci please look what's going on <${{ env.JOB_URL }}|here>"

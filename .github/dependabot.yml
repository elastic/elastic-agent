---
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    labels:
      - automation
      - skip-changelog
      - Team:Elastic-Agent-Control-Plane
      - backport-active-all
    ignore:
      # beats is a git submodule; bumped separately
      - dependency-name: "github.com/elastic/beats/*"
      # elastic/sarama fork must be managed manually to avoid module path mismatch issues
      - dependency-name: "github.com/elastic/sarama"
      # Otel dependency updates are done in lock-step with the upstream Otel release cycle
      - dependency-name: "go.opentelemetry.io/*"
      - dependency-name: "github.com/open-telemetry/*"
      - dependency-name: "github.com/elastic/opentelemetry-collector-components/*"
    groups:
      # k8s-ecosystem must come before the elastic group: Dependabot assigns a dependency to
      # the first matching group, and elastic/cloud-on-k8s would otherwise match the elastic
      # group's wildcard pattern first.
      k8s-ecosystem:
        patterns:
          # k8s core libraries
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          # Direct dependencies whose own go.mod requires k8s.io/* and must be bumped
          # in lockstep when k8s has a breaking API change
          - "helm.sh/helm/*"
          - "github.com/elastic/cloud-on-k8s/*"
      elastic:
        patterns:
          # github.com/elastic/* and go.elastic.co/* cover all Elastic and APM Go packages
          - "github.com/elastic/*"
          - "go.elastic.co/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
      tooling-test:
        patterns:
          # Test frameworks and helpers
          - "github.com/stretchr/*"
          - "github.com/testcontainers/*"
          # Only used in *_test.go files
          - "github.com/google/pprof"
          - "github.com/google/go-containerregistry"
          - "github.com/cavaliergopher/*"
          - "github.com/blakesmith/*"
          # Only used in pkg/testing/
          - "github.com/sajari/*"
          - "github.com/moby/*"
      packaging:
        patterns:
          # Build tooling: only used in magefile.go, dev-tools/, or tools/tools.go
          - "github.com/magefile/*"
          - "github.com/Jeffail/gabs/*"
          - "github.com/josephspurrier/goversioninfo"
          - "github.com/rednafi/link-patrol"
          - "gotest.tools/*"
          - "github.com/vektra/mockery/*"
      misc:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directories:
      - '/'
      - '/.github/actions/*'
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"
    labels:
      - automation
      - skip-changelog
      - Team:Elastic-Agent-Control-Plane
      - backport-active-all
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/docs/scripts/update-docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    labels:
      - automation
      - skip-changelog
      - Team:Docs
      - documentation
    open-pull-requests-limit: 5

  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '22:00'
    open-pull-requests-limit: 5
    labels:
      - 'changelog:dependencies'

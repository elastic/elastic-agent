notify:
  - slack:
      channels:
        - "#ingest-notifications"
      message: "<!subteam^S030QSX59PH|agent-control-plane-team> Version bump to ${NEW_VERSION} — ${BUILDKITE_BUILD_URL}"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+\$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#ingest-notifications"
      message: |
        <!subteam^S030QSX59PH|agent-control-plane-team>
        🚦 Pipeline waiting to be unblocked 🚦
        Repo: `${REPO}`

        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

env:
  IMAGE_BEATS_WITH_HOOKS_LATEST: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:latest"

steps:
  # BRANCH is major.minor (e.g. 9.5 for a 9.5.0 minor release, 9.4 for a 9.4.3 patch).
  - label: "Bump version minor"
    key: bump-version-minor
    if: build.env("WORKFLOW") == "minor"
    agents:
      image: "${IMAGE_BEATS_WITH_HOOKS_LATEST}"
      cpu: "4000m"
      memory: "8Gi"
      useCustomGlobalHooks: true
    env:
      CURRENT_RELEASE: "${NEW_VERSION}"
    plugins:
      - elastic/vault-github-token#v0.2.1: ~
    command:
      - mage release:runMajorMinor
    timeout_in_minutes: 60

  - label: "Bump version patch"
    key: bump-version-patch
    if: build.env("WORKFLOW") == "patch"
    agents:
      image: "${IMAGE_BEATS_WITH_HOOKS_LATEST}"
      cpu: "4000m"
      memory: "8Gi"
      useCustomGlobalHooks: true
    env:
      CURRENT_RELEASE: "${NEW_VERSION}"
      BASE_BRANCH: "${BRANCH}"
    plugins:
      - elastic/vault-github-token#v0.2.1: ~
    command:
      - mage release:runPatch
    timeout_in_minutes: 60

  - block: "Placeholder blocked step"
    prompt: |
      Unblock when your team is ready to proceed.

      Trigger parameters:
      - NEW_VERSION: ${NEW_VERSION}
      - BRANCH: ${BRANCH}
      - WORKFLOW: ${WORKFLOW}
    key: block-get-dra-artifacts
    blocked_state: running

  - label: "Create branch for version bump"
    key: branch-for-version-bump
    depends_on: block-get-dra-artifacts
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 500m
      memory: 1Gi
      ephemeralStorage: 1Gi
    command:
      - echo "Placeholder"

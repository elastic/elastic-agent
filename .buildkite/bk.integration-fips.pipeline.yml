# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

env:
  ASDF_MAGE_VERSION: 1.14.0
  MS_GOTOOLCHAIN_TELEMETRY_ENABLED: "0"

  IMAGE_UBUNTU_2404_X86_64: "platform-ingest-elastic-agent-ubuntu-2404-1772525581"
  IMAGE_UBUNTU_X86_64_FIPS: "platform-ingest-elastic-agent-ubuntu-2204-fips-1772525581"
  IMAGE_UBUNTU_ARM64_FIPS: "platform-ingest-elastic-agent-ubuntu-2204-fips-aarch64-1772525581"

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_observability_plugin: &google_oidc_observability_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      elastic/oblt-google-auth#v1.3.0:
        lifetime: 10800 # seconds
  - oblt_cli_plugin: &oblt_cli_plugin
      elastic/oblt-cli#v0.4.0:
        version-file: .oblt-cli-version
  - vault_github_token: &vault_github_token
      elastic/vault-github-token#v0.1.0:

steps:
  - label: Start ESS stack for FIPS integration tests
    depends_on:
      - packaging-containers-amd64-fips
      - packaging-containers-arm64-fips
    key: integration-fips-ess
    env:
      FIPS: "true"
    command: .buildkite/scripts/steps/ess_start.sh
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - group: "fips:Stateful:Ubuntu"
    key: integration-tests-ubuntu-fips
    depends_on:
      - integration-fips-ess
    steps:
      - label: "fips:x86_64:sudo-{{matrix.sudo}}:{{matrix.groups}}"
        depends_on:
          - packaging-amd64-fips # Reuse artifacts produced in .buildkite/integration.pipeline.yml
        env:
          FIPS: "true"
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/** . --step 'packaging-amd64-fips'
          .buildkite/scripts/steps/integration_tests_tf.sh {{matrix.groups}} {{matrix.sudo}}
        artifact_paths:
          - build/**
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "aws"
          image: "${IMAGE_UBUNTU_X86_64_FIPS}"
          instanceType: "m5.2xlarge"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            sudo:
              - "false"
              - "true"
            groups:
              - fleet # currently there is only a single test in the fleet group, add more tests once they have been defined

      - label: "fips:arm64:sudo-{{matrix.sudo}}:{{matrix.groups}}"
        depends_on:
          - packaging-arm64-fips
        env:
          FIPS: "true"
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/** . --step 'packaging-arm64-fips'
          .buildkite/scripts/steps/integration_tests_tf.sh {{matrix.groups}} {{matrix.sudo}}
        artifact_paths:
          - build/**
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "aws"
          image: "${IMAGE_UBUNTU_ARM64_FIPS}"
          instanceType: "m6g.2xlarge"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            sudo:
              - "false"
              - "true"
            groups:
              - fleet

      - label: "fips:upgrade-ech-deployment"
        if: build.env("BUILDKITE_PULL_REQUEST") != "false" &&  build.env("GITHUB_PR_LABELS") =~ /.*(Testing:run:TestUpgradeIntegrationsServer).*/
        env:
          FIPS: "true"
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          .buildkite/scripts/buildkite-integration-tests.sh ech-deployment false
        artifact_paths:
          - build/**
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "aws"
          image: "${IMAGE_UBUNTU_X86_64_FIPS}"
          instanceType: "m5.2xlarge"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

  - label: ESS FIPS stack cleanup
    depends_on:
      - integration-tests-ubuntu-fips
    env:
      FIPS: "true"
    allow_dependency_failure: true
    command: .buildkite/scripts/steps/ess_down.sh
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - label: Aggregate test reports
    depends_on:
      - integration-tests-ubuntu-fips
    allow_dependency_failure: true
    command: |
      buildkite-agent artifact download "build/*.xml" .
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    soft_fail:
      - exit_status: "*"
    plugins:
      - elastic/vault-secrets#v0.1.0:
          path: "kv/ci-shared/platform-ingest/buildkite_analytics_token"
          field: "token"
          env_var: "BUILDKITE_ANALYTICS_TOKEN"
      - test-collector#v1.11.0:
          files: "build/*.xml"
          format: "junit"
          branches: "main"
          debug: true

# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
# Diagnostic pipeline: two Windows 11 variants for golang/go#77975.
# "diagnostic" run: GOGC=1 forces a GC after every alloc to maximise the
# shrinkstack/scanstack frequency and make the IOCP stack-corruption crash
# more consistent. "instrumented" run: WER dumps + clobberfree + gctrace.

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go

env:
  # The following images are defined here and their values will be updated by updatecli
  # Please do not change them manually.
  IMAGE_UBUNTU_2204_X86_64: "platform-ingest-elastic-agent-ubuntu-2204-1778806890"
  IMAGE_UBUNTU_2204_ARM_64: "platform-ingest-elastic-agent-ubuntu-2204-aarch64-1778806890"
  IMAGE_WIN_2016: "platform-ingest-elastic-agent-windows-2016-1778806890"
  IMAGE_WIN_2022: "platform-ingest-elastic-agent-windows-2022-1778806890"
  IMAGE_WIN_10: "platform-ingest-elastic-agent-windows-10-pro"
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_ARM64: "platform-ingest-elastic-agent-windows-11-pro-arm64"
  IMAGE_WIN_10_VERSION: "1.0.1778806890"
  IMAGE_WIN_11_VERSION: "1.0.1778806890"
  IMAGE_WIN_11_ARM64_VERSION: "1.0.1778806890"

steps:
  - label: "Unit tests - Windows 11 (diagnostic run %n)"
    key: "unit-tests-win11"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true

  - label: "Unit tests - Windows 11 (instrumented run %n)"
    key: "unit-tests-win11-instrumented"
    command: .buildkite/scripts/steps/unit-tests-instrumented.ps1
    parallelism: 5
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
      - "build/dumps/*.dmp"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true

      - label: "Unit tests - fips140=only Windows 11 arm64"
        key: "unit-tests-win11-arm64-fips140-only"
        command: .buildkite/scripts/steps/unit-tests.ps1
        env:
          FIPS: "true"
        artifact_paths:
          - "build/TEST-*.html"
          - "build/TEST-*.xml"
          - "build/diagnostics/*"
          - "coverage-*.out"
        agents:
          provider: "azure"
          image: "${IMAGE_WIN_11_ARM64}"
          imageVersion: "${IMAGE_WIN_11_ARM64_VERSION}"
          vmSize: "Standard_D8ps_v6"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
          manual:
            allowed: true

  - label: ":junit: Junit annotate"
    agents:
      image: "docker.elastic.co/ci-agent-images/buildkite-junit-annotate:1.0"
    plugins:
      - junit-annotate#v2.7.0:
          artifacts: "**TEST-*.xml"
          always-annotate: true
          run-in-docker: false
    depends_on:
      - step: "unit-tests-win11"
        allow_failure: true
      - step: "unit-tests-win11-instrumented"
        allow_failure: true
      - step: "unit-tests-win2022-fips140-only"
        allow_failure: true
      - step: "unit-tests-win11-arm64-fips140-only"
        allow_failure: true

  - wait: ~

# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
# Diagnostic pipeline for the Windows/amd64 GC-metadata-corruption crash.
# EXPLORATORY build. Prior cofactor A/Bs established the crash is -race-GATED and
# that coverage / GOGC=1 are NOT cofactors. The crash rate is dominated by an
# UNCONTROLLED variable - host CPU contention / hypervisor vCPU steal (a quiet
# dedicated VM never reproduced; the shared CI fleet does). So this build (1)
# PERTURBS the environment to try to raise the rate, and (2) MONITORS every run
# so the relevant host factor can be found by correlation with crash outcome.
#
# Cohorts (all -race; control = -race, GOGC=1, coverage, full suite):
#   control          baseline rate + monitoring reference
#   no-race          negative control (confirms the -race gate still holds)
#   async-preempt    ASYNC_PREEMPT=1: SIGURG preemption at arbitrary PCs - the
#                    in-guest analog of vCPU-steal's arbitrary-boundary descheduling
#   maxprocs-oversub GOMAXPROCS=32 (4x vCPU): more GC mark workers spread across /
#                    migrating between more logical CPUs than the host grants
#   cpu-antagonist   8 busy-spin siblings (envprobe -burn) stacking in-guest
#                    contention on top of the host's real steal
#   concentrate-fire upgrade pkg only, MAX_RUNS=15: more crash attempts per job
#                    (multi-variable, exploratory - not a clean single-var A/B)
#   kitchen-sink     async-preempt + oversub + antagonist combined (the bet to
#                    "trigger failures more consistently")
#
# Monitoring on EVERY cohort (see unit-tests.ps1), captured on crash AND clean
# runs: a 1ms scheduling-stall + TSC-skew sampler (sched-probe-*), and a one-shot
# Go env-probe (host-info-*) capturing job-object CPU-rate control, affinity /
# priority, and an injected-DLL scan, plus Azure host identity via IMDS.

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      # Required for buildkite-agent artifact upload to GCS, including the
      # WER crash dumps the instrumented job depends on.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go
  - win11_agent: &win11_agent
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"

env:
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_VERSION: "1.0.1779464011"

steps:
  - label: "Unit tests - Windows 11 (control run %n)"
    key: "unit-tests-win11-control"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (no-race run %n)"
    key: "unit-tests-win11-norace"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      NO_RACE: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (async-preempt run %n)"
    key: "unit-tests-win11-asyncpreempt"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      ASYNC_PREEMPT: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (maxprocs-oversub run %n)"
    key: "unit-tests-win11-maxprocs"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      GOMAXPROCS_SET: "32"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (cpu-antagonist run %n)"
    key: "unit-tests-win11-antagonist"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      CPU_ANTAGONISTS: "8"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (concentrate-fire run %n)"
    key: "unit-tests-win11-concentrate"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      TEST_PKG: "./internal/pkg/agent/application/upgrade/..."
      MAX_RUNS: "15"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (kitchen-sink run %n)"
    key: "unit-tests-win11-kitchensink"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      ASYNC_PREEMPT: "1"
      GOMAXPROCS_SET: "32"
      CPU_ANTAGONISTS: "8"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - wait: ~

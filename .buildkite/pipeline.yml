# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
# Diagnostic pipeline: two Windows 11 variants for golang/go#77975.
# "diagnostic" run: GOGC=1 forces a GC after every alloc to maximise the
# shrinkstack/scanstack frequency and make the IOCP stack-corruption crash
# more consistent. "instrumented" run: WER dumps + clobberfree + gctrace.

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      # Required for buildkite-agent artifact upload to GCS, including the
      # WER crash dumps the instrumented job depends on.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go

env:
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_VERSION: "1.0.1779464011"

steps:
  - label: "Unit tests - Windows 11 (control run %n)"
    key: "unit-tests-win11"
    # Positive control: amd64, -race ON, mitigations at default. This is the
    # known-crashing baseline the other two cohorts are compared against.
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (no-race run %n)"
    key: "unit-tests-win11-norace"
    # amd64 with the race detector OFF (NO_RACE=1), everything else identical to
    # the control. Tests whether the crash needs -race. If the control crashes
    # but this stays clean, the repro is -race-gated - which also explains why
    # arm64 never crashes (the race detector is windows/amd64-only) and shifts
    # the prime suspect to the race-detector (tsan) runtime. If this also
    # crashes, the bug is independent of -race.
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      NO_RACE: "1"
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (no-mitigations IFEO run %n)"
    key: "unit-tests-win11-nomit"
    # amd64, -race ON, but mitigations actually disabled per test-binary via IFEO
    # (DISABLE_MITIGATIONS_IFEO=1). Unlike the earlier Set-ProcessMitigation
    # -System approach (a no-op without a reboot), per-image IFEO applies at
    # process creation - so this is the FIRST run where mitigations are genuinely
    # off on the test processes. The job self-verifies via a per-process posture
    # probe. If the control crashes but this stays clean, mitigations (CET/ASLR)
    # really do matter; if this crashes too, they're conclusively not involved.
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      DISABLE_MITIGATIONS_IFEO: "1"
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (instrumented run %n)"
    key: "unit-tests-win11-instrumented"
    command: .buildkite/scripts/steps/unit-tests-instrumented.ps1
    parallelism: 5
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
      - "build/dumps/*.dmp"
      - "build/bins/*.exe"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: ":junit: Junit annotate"
    agents:
      image: "docker.elastic.co/ci-agent-images/buildkite-junit-annotate:1.0"
    plugins:
      - junit-annotate#v2.7.0:
          artifacts: "**TEST-*.xml"
          always-annotate: true
          run-in-docker: false
      - *google_oidc_plugin
    depends_on:
      - step: "unit-tests-win11"
        allow_failure: true
      - step: "unit-tests-win11-norace"
        allow_failure: true
      - step: "unit-tests-win11-nomit"
        allow_failure: true
      - step: "unit-tests-win11-instrumented"
        allow_failure: true

  - wait: ~

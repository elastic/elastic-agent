# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
# Diagnostic pipeline for the Windows/amd64 GC-metadata-corruption crash.
# Cofactor A/B build: cohorts in the SAME build (shared host conditions, so
# build-to-build variance cancels), each differing from the `control` by exactly
# one variable, to isolate what the crash needs:
#   control       -race, GOGC=1, coverage   (known positive control)
#   no-race       control minus -race       (confirms the -race gate / negative control)
#   no-cover      control minus -coverpkg    (is the coverage-globals footprint a cofactor?)
#   gogc-default  control minus GOGC=1       (is GC-pressure amplification required?)
#   async-preempt control plus async preemption (ASYNC_PREEMPT=1, removes
#                 asyncpreemptoff): does arbitrary-PC signal preemption AMPLIFY
#                 the rate? "missing stackmap" is preemption-adjacent.
#   gogc10        control but GOGC=10 instead of 1: middle GC-pressure amplifier.
# Prior cofactor builds established -race is required and coverage/GOGC=1 are not.
# The new open question is what AMPLIFIES the rate; async-preempt + gogc10 target
# that. Every cohort also runs an environment probe (see unit-tests.ps1): a
# scheduling-stall + cross-core-TSC sampler plus Azure host identity, captured on
# crash AND clean runs so the steal hypothesis can be tested by correlation.

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      # Required for buildkite-agent artifact upload to GCS, including the
      # WER crash dumps the instrumented job depends on.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go
  - win11_agent: &win11_agent
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"

env:
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_VERSION: "1.0.1779464011"

steps:
  - label: "Unit tests - Windows 11 (control run %n)"
    key: "unit-tests-win11-control"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (no-race run %n)"
    key: "unit-tests-win11-norace"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      NO_RACE: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (no-cover run %n)"
    key: "unit-tests-win11-nocover"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      NO_COVER: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (gogc-default run %n)"
    key: "unit-tests-win11-gogcdefault"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      GOGC_DEFAULT: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (async-preempt run %n)"
    key: "unit-tests-win11-asyncpreempt"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      ASYNC_PREEMPT: "1"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (gogc10 run %n)"
    key: "unit-tests-win11-gogc10"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      GOGC_OVERRIDE: "10"
    artifact_paths: ["coverage-*.out", "sched-probe-*.log", "host-info-*.log"]
    agents: *win11_agent
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - wait: ~

# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go

env:
  # The following images are defined here and their values will be updated by updatecli
  # Please do not change them manually.
  IMAGE_UBUNTU_2204_X86_64: "platform-ingest-elastic-agent-ubuntu-2204-1779098505"
  IMAGE_UBUNTU_2204_ARM_64: "platform-ingest-elastic-agent-ubuntu-2204-aarch64-1779098505"
  IMAGE_WIN_2016: "platform-ingest-elastic-agent-windows-2016-1779098505"
  IMAGE_WIN_2022: "platform-ingest-elastic-agent-windows-2022-1779098505"
  IMAGE_WIN_10: "platform-ingest-elastic-agent-windows-10-pro"
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_ARM64: "platform-ingest-elastic-agent-windows-11-pro-arm64"
  IMAGE_WIN_10_VERSION: "1.0.1779098505"
  IMAGE_WIN_11_VERSION: "1.0.1779098505"
  IMAGE_WIN_11_ARM64_VERSION: "1.0.1779098505"

steps:
  - label: "check-ci"
    key: "check-ci"
    command: ".buildkite/scripts/steps/check-ci.sh"
    agents:
      provider: "gcp"
      image: "${IMAGE_UBUNTU_2204_X86_64}"
    retry:
      manual:
        allowed: true

  - group: "Unit tests"
    key: "unit-tests"
    steps:
      - label: "Unit tests - Ubuntu 22.04"
        key: "unit-tests-2204"
        command: ".buildkite/scripts/steps/unit-tests.sh"
        artifact_paths:
          - "build/TEST-*.html"
          - "build/TEST-*.xml"
          - "build/diagnostics/*"
          - "coverage-*.out"
        agents:
          provider: "gcp"
          image: "${IMAGE_UBUNTU_2204_X86_64}"
          machineType: "n2-standard-8"
        retry:
          automatic:
            limit: 1
          manual:
            allowed: true

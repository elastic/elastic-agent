# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
# Diagnostic pipeline: two Windows 11 variants for golang/go#77975.
# "diagnostic" run: GOGC=1 forces a GC after every alloc to maximise the
# shrinkstack/scanstack frequency and make the IOCP stack-corruption crash
# more consistent. "instrumented" run: WER dumps + clobberfree + gctrace.

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      # Required for buildkite-agent artifact upload to GCS, including the
      # WER crash dumps the instrumented job depends on.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
  - sparse_checkout_plugin: &sparse_checkout_plugin
      sparse-checkout#v1.6.0:
        paths:
        - .buildkite
        - .go-version
        - .package-version
        - version/version.go

env:
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_VERSION: "1.0.1779464011"

steps:
  - label: "Unit tests - Windows 11 (diagnostic run %n)"
    key: "unit-tests-win11"
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (nogreenteagc run %n)"
    key: "unit-tests-win11-nogreenteagc"
    # Same diagnostic config as unit-tests-win11, but with the Green Tea GC
    # experiment disabled (GOEXPERIMENT=...,nogreenteagc). Green Tea GC is the
    # new default-on collector in Go 1.26, and golang/go#77975 ("Windows crash
    # with Go 1.26.0/1.26.1") implicates a Green Tea GC stack-scanning /
    # copystack marking bug. This is the decisive A/B: it differs from the
    # plain diagnostic variant by exactly one flag. If this variant stops
    # reproducing the crash while unit-tests-win11 keeps crashing, the agent's
    # crashes are confirmed to be that Green Tea GC bug - the evidence to
    # attach to the upstream issue.
    #
    # (The earlier gcshrinkstackoff=1 variant was retired: build 40538 showed
    # it failed at the same 7/10 rate as the plain variant, ruling out stack
    # *shrinking* as the mechanism. copystack on stack *growth* is not disabled
    # by that flag and remains in scope under the Green Tea hypothesis.)
    command: .buildkite/scripts/steps/unit-tests.ps1
    parallelism: 10
    env:
      EXTRA_GOEXPERIMENT: "nogreenteagc"
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: "Unit tests - Windows 11 (instrumented run %n)"
    key: "unit-tests-win11-instrumented"
    command: .buildkite/scripts/steps/unit-tests-instrumented.ps1
    parallelism: 5
    artifact_paths:
      - "build/TEST-*.html"
      - "build/TEST-*.xml"
      - "build/diagnostics/*"
      - "coverage-*.out"
      - "build/dumps/*.dmp"
      - "build/bins/*.exe"
    agents:
      provider: "azure"
      image: "${IMAGE_WIN_11}"
      imageVersion: "${IMAGE_WIN_11_VERSION}"
      vmSize: "Standard_D8s_v5"
      diskSizeGb: "256"
    retry:
      manual:
        allowed: true
    plugins:
      - *google_oidc_plugin

  - label: ":junit: Junit annotate"
    agents:
      image: "docker.elastic.co/ci-agent-images/buildkite-junit-annotate:1.0"
    plugins:
      - junit-annotate#v2.7.0:
          artifacts: "**TEST-*.xml"
          always-annotate: true
          run-in-docker: false
      - *google_oidc_plugin
    depends_on:
      - step: "unit-tests-win11"
        allow_failure: true
      - step: "unit-tests-win11-nogreenteagc"
        allow_failure: true
      - step: "unit-tests-win11-instrumented"
        allow_failure: true

  - wait: ~

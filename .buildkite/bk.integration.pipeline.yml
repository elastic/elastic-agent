        matrix:
          setup:
            os:
              - "${IMAGE_DEBIAN_13}"
            variant: *linux_deb_variants

      - label: "linux:amd64:tier2:{{matrix.sudo}}:{{matrix.variant}}:{{matrix.os}}"
        depends_on: packaging-amd64

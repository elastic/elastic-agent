# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

env:
  ASDF_MAGE_VERSION: 1.14.0
  ASDF_KIND_VERSION: "0.27.0"
  ASDF_TERRAFORM_VERSION: 1.9.2

  # The following images are defined here and their values will be updated by updatecli
  # Please do not change them manually.
  IMAGE_UBUNTU_2404_X86_64: "platform-ingest-elastic-agent-ubuntu-2404-1779223036"
  IMAGE_UBUNTU_2404_ARM_64: "platform-ingest-elastic-agent-ubuntu-2404-aarch64-1779223036"
  IMAGE_RHEL_8: "platform-ingest-elastic-agent-rhel-8-1779223036"
  IMAGE_RHEL_10: "platform-ingest-elastic-agent-rhel-10-1779223036"
  IMAGE_DEBIAN_11: "platform-ingest-elastic-agent-debian-11-1779223036"
  IMAGE_DEBIAN_13: "platform-ingest-elastic-agent-debian-13-1779223036"
  IMAGE_WIN_10: "platform-ingest-elastic-agent-windows-10-pro"
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_ARM64: "platform-ingest-elastic-agent-windows-11-pro-arm64"
  IMAGE_WIN_2016: "platform-ingest-elastic-agent-windows-2016-1779223036"
  IMAGE_WIN_2022: "platform-ingest-elastic-agent-windows-2022-1779223036"
  IMAGE_WIN_2025: "platform-ingest-elastic-agent-windows-2025-1779223036"
  # Same version for all the azure images
  IMAGE_WIN_VERSION: "1.0.1779223036"

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
# see https://github.com/avaly/gcp-secret-manager-buildkite-plugin/pull/10
# see https://github.com/avaly/gcp-secret-manager-buildkite-plugin/pull/11
#  - gcp_serverless_secrets_plugin: &gcp_serverless_secrets_plugin
      #avaly/gcp-secret-manager#v1.2.0:
  - gcp_serverless_secrets_plugin: &gcp_serverless_secrets_plugin
      elastic/gcp-secret-manager#v1.3.0-elastic:
        env:
          # These secrets are created in .github/workflows/serverless-project.yml
          ELASTICSEARCH_HOST: ea-serverless-it-elasticsearch-hostname
          ELASTICSEARCH_PASSWORD: ea-serverless-it-elasticsearch-password
          ELASTICSEARCH_USERNAME: ea-serverless-it-elasticsearch-username
          KIBANA_HOST: ea-serverless-it-kibana-hostname
          KIBANA_USERNAME: ea-serverless-it-kibana-username
          KIBANA_PASSWORD: ea-serverless-it-kibana-password
  - google_oidc_observability_plugin: &google_oidc_observability_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
  - oblt_cli_plugin: &oblt_cli_plugin
      elastic/oblt-cli#v0.4.1:
        version-file: .oblt-cli-version
  - vault_github_token: &vault_github_token
      elastic/vault-github-token#v0.1.0:

steps:
  - label: "Custom ECH Testing"
    key: integration-tests-ech
    depends_on:
      - packaging-containers-amd64
      - packaging-containers-arm64
    env:
      TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
      FORCE_ESS_CREATE: "true"
      INTEGRATION_SERVER_DOCKER_IMAGE: "docker.elastic.co/beats-ci/elastic-agent-cloud:git-${BUILDKITE_COMMIT:0:12}"
    command: |
      #!/usr/bin/env bash
      buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
      .buildkite/scripts/steps/integration_tests_oblt-cli.sh ech true
    artifact_paths:
      - build/*
      - build/diagnostics/**
    retry:
      automatic:
        limit: 1
    agents:
      provider: "gcp"
      machineType: "n2-standard-8"
      image: "${IMAGE_UBUNTU_2404_X86_64}"
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - label: Start ESS stack for integration tests
    key: integration-ess
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - ESS stack provision"
    command: .buildkite/scripts/steps/ess_start_oblt-cli.sh
    retry:
      automatic:
        limit: 1
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - group: "Extended runtime leak tests"
    skip: "faster"
    key: extended-integration-tests
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Runtime leak tests"
    depends_on:
      - integration-ess
    steps:
      - label: "Windows:2022:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64*  . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

      - label: "Windows:2025:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2025}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

      - label: "Ubuntu:2404:amd64:sudo"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

  - group: "Stateful: Windows (tier 1)"
    if: build.pull_request.id != null
    key: integration-tests-win-tier-1
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 1"
    depends_on:
      - integration-ess
    steps:
      - label: "Win:amd64:Tier1:{{matrix.sudo}}:{{matrix.variant}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} {{matrix.sudo}}
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            sudo:
              - true
              - false
            variant:
            - default
            - fleet
            - fleet-endpoint-security
            - fleet-privileged
            - standalone-upgrade
            - upgrade
            - upgrade-flavor
            - install-uninstall
            adjustments:
              - with:
                  sudo: false
                  variant:
                    - default

  - group: "Stateful: Windows (tier 2)"
    if_changed:
      include:
        - .buildkite/**
        - magefile.go
        - dev-tools/**
        - go.mod
        - go.sum
    key: integration-tests-win-tier2
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 2"
    depends_on:
      - integration-ess
    steps:

      - label: "Win:amd64:Tier2:{{matrix.sudo}}:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} {{matrix.sudo}}
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_2016}"
            sudo:
              - true
              - false
            variant:
              - default
              - fleet
              - fleet-endpoint-security
              - fleet-privileged
              - standalone-upgrade
              - upgrade
              - upgrade-flavor
              - install-uninstall
            adjustments:
              - with:
                  sudo: false
                  variant:
                    - default

  - group: "Stateful: Windows (tier 3)"
    key: integration-tests-win-tier3
    if: build.source == "schedule"
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 3"
    depends_on:
      - integration-ess
    steps:
      - label: "Win:amd64:Tier3:{{matrix.sudo}}:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} {{matrix.sudo}}
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_2016}"
              - "${IMAGE_WIN_2022}"
              - "${IMAGE_WIN_2025}"
            sudo:
              - true
              - false
            variant:
              - default
              - fleet
              - fleet-endpoint-security
              - fleet-privileged
              - standalone-upgrade
              - upgrade
              - upgrade-flavor
              - install-uninstall
            adjustments:
              - with:
                  sudo: false
                  variant:
                    - default

      - label: "Win:amd64:Tier3:{{matrix.sudo}}:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} {{matrix.sudo}}
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "{{matrix.os}}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8s_v5"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_10}"
              - "${IMAGE_WIN_11}"
            sudo:
              - true
              - false
            variant:
              - default
              - fleet
              - fleet-endpoint-security
              - fleet-privileged
              - standalone-upgrade
              - upgrade
              - upgrade-flavor
              - install-uninstall
            adjustments:
              - with:
                  sudo: false
                  variant:
                    - default

      - label: "Win:arm64:Tier3:{{matrix.sudo}}:{{matrix.variant}}"
        depends_on:
          - packaging-arm64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-arm64* . --step 'packaging-arm64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} {{matrix.sudo}}
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "${IMAGE_WIN_11_ARM64}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8ps_v6"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            sudo:
              - true
              - false
            variant:
              - default
              - fleet
              - fleet-endpoint-security
              - fleet-privileged
              - standalone-upgrade
              - upgrade
              - upgrade-flavor
              - install-uninstall
            adjustments:
              - with:
                  sudo: false
                  variant:
                    - default

  - group: "Stateful:Ubuntu"
    skip: "faster"
    key: integration-tests-ubuntu
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Ubuntu"
    depends_on:
      - integration-ess
    steps:
      - label: "x86_64:non-sudo: {{matrix}}"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          - default

      - label: "x86_64:sudo: {{matrix}}"
        depends_on:
          - packaging-amd64
        # due to deb group present in matrix tar.gz and deb packages artifacts are required
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step packaging-amd64
          buildkite-agent artifact download build/distributions/elastic-agent-*-amd64.deb* . --step packaging-amd64
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          - default
          - upgrade
          - upgrade-flavor
          - standalone-upgrade
          - fleet
          - fleet-endpoint-security
          - fleet-airgapped
          - fleet-airgapped-privileged
          - fleet-privileged
          - fleet-upgrade-to-pr-build
          - install-uninstall
          - fqdn
          - deb
          - container

      - label: "arm:sudo: {{matrix}}"
        depends_on:
          - packaging-arm64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-arm64* . --step 'packaging-arm64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "aws"
          image: "${IMAGE_UBUNTU_2404_ARM_64}"
          instanceType: "m6g.2xlarge"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          - default
          - upgrade
          - upgrade-flavor
          - standalone-upgrade
          - fleet
          # ARM tests are enabled for only selected groups in order to save resources
          # - fleet-endpoint-security
          # - fleet-airgapped
          # - fleet-airgapped-privileged
          # - fleet-privileged
          # - fleet-upgrade-to-pr-build
          # - install-uninstall
          # - fqdn
          # - deb
          # - container

      - label: "arm:non-sudo: {{matrix}}"
        skip: true
        depends_on:
          - packaging-arm64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-arm64* . --step 'packaging-arm64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "aws"
          image: "${IMAGE_UBUNTU_2404_ARM_64}"
          instanceType: "m6g.xlarge"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          - default

  - group: "Stateful:Debian"
    skip: "faster"
    key: integration-tests-debian
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Debian"
    depends_on:
      - integration-ess
    steps:
      - label: "x86_64:non-sudo: {{matrix.group}} - {{matrix.image}}"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix.group}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.image}}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            image:
              - "${IMAGE_DEBIAN_11}"
              - "${IMAGE_DEBIAN_13}"
            group:
              - default

      - label: "x86_64:sudo: {{matrix.group}} - {{matrix.image}}"
        depends_on:
          - packaging-amd64
        # due to deb group present in matrix tar.gz and deb packages artifacts are required
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step packaging-amd64
          buildkite-agent artifact download build/distributions/elastic-agent-*-amd64.deb* . --step packaging-amd64
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix.group}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.image}}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            image:
              - "${IMAGE_DEBIAN_11}"
              - "${IMAGE_DEBIAN_13}"
            group:
              - default
              - upgrade
              - upgrade-flavor
              - standalone-upgrade
              - fleet
              - fleet-endpoint-security
              - fleet-airgapped
              - fleet-airgapped-privileged
              - fleet-privileged
              - fleet-upgrade-to-pr-build
              - install-uninstall
              # FQDN test failing at debian 12. Relevant issue https://github.com/elastic/elastic-agent/issues/7476
              #- fqdn
              - deb
              - container

  - group: "Stateful:RHEL"
    skip: "faster"
    key: integration-tests-rhel
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - RHEL"
    depends_on:
      - integration-ess
    steps:
      - label: "x86_64:sudo:rpm - {{matrix.image}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-x86_64.rpm* . --step packaging-amd64
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh rpm true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.image}}"
        matrix:
          setup:
            image:
              - "${IMAGE_RHEL_8}"
              - "${IMAGE_RHEL_10}"

  - label: ":kubernetes: Kubernetes"
    skip: "faster"
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Kubernetes"
    depends_on:
      - integration-ess
      - packaging-containers-amd64
    command: ".buildkite/scripts/upload-k8s-tests.sh"

  - group: "Serverless integration test"
    skip: "faster"
    key: integration-tests-serverless
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Serverless integration test"
    steps:
      - label: "Windows:2022:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/serverless"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/buildkite-integration-tests.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        plugins:
          - *google_oidc_observability_plugin
          - *google_oidc_plugin
          - *gcp_serverless_secrets_plugin

      - label: "Windows:2025:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/serverless"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/buildkite-integration-tests.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2025}"
        plugins:
          - *google_oidc_observability_plugin
          - *google_oidc_plugin
          - *gcp_serverless_secrets_plugin
      - label: "Ubuntu:2404:amd64:sudo"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/serverless"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          sudo -E .buildkite/scripts/buildkite-integration-tests.sh fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *google_oidc_plugin
          - *gcp_serverless_secrets_plugin

  - label: ESS stack cleanup
    depends_on:
      - integration-tests-ubuntu
      - integration-tests-win-tier-1
      - integration-tests-win-tier-2
      - integration-tests-win-tier-3
      - integration-tests-rhel
      - integration-tests-kubernetes
      - extended-integration-tests
      - integration-tests-debian
    allow_dependency_failure: true
    command: |
      .buildkite/scripts/steps/ess_cleanup_all.sh
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token
  - label: Aggregate test reports
    # Warning: The key has a hook in pre-command
    key: aggregate-reports
    depends_on:
      - integration-tests-ech
      - integration-tests-ubuntu
      - integration-tests-win-tier-1
      - integration-tests-win-tier-2
      - integration-tests-win-tier-3
      - integration-tests-rhel
      - integration-tests-kubernetes
      - integration-tests-serverless
      - integration-tests-debian
    allow_dependency_failure: true
    command: |
      buildkite-agent artifact download "build/*.xml" .
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    soft_fail:
      - exit_status: "*"
    plugins:
      - elastic/vault-secrets#v0.1.0:

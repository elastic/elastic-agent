    depends_on:
      - integration-ess
    steps:
      - label: "linux:amd64:tier2:non-sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step packaging-amd64
          buildkite-agent artifact download build/distributions/elastic-agent-*-amd64.deb* . --step packaging-amd64
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_DEBIAN_13}"
            variant:
              - default

      - label: "linux:amd64:tier2:sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        # due to deb group present in matrix tar.gz and deb packages artifacts are required

# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

env:
  ASDF_MAGE_VERSION: 1.14.0
  ASDF_KIND_VERSION: "0.27.0"
  ASDF_TERRAFORM_VERSION: 1.9.2

  # The following images are defined here and their values will be updated by updatecli
  # Please do not change them manually.
  IMAGE_UBUNTU_2204_X86_64: "platform-ingest-elastic-agent-ubuntu-2204-1780275718"
  IMAGE_UBUNTU_2404_X86_64: "platform-ingest-elastic-agent-ubuntu-2404-1780275718"
  IMAGE_UBUNTU_2404_ARM_64: "platform-ingest-elastic-agent-ubuntu-2404-aarch64-1780275718"
  IMAGE_RHEL_8: "platform-ingest-elastic-agent-rhel-8-1780275718"
  IMAGE_RHEL_10: "platform-ingest-elastic-agent-rhel-10-1780275718"
  IMAGE_DEBIAN_11: "platform-ingest-elastic-agent-debian-11-1780275718"
  IMAGE_DEBIAN_13: "platform-ingest-elastic-agent-debian-13-1780275718"
  IMAGE_WIN_2022: "platform-ingest-elastic-agent-windows-2022-1780275718"
  IMAGE_WIN_2025: "platform-ingest-elastic-agent-windows-2025-1780275718"
  IMAGE_WIN_2016: "platform-ingest-elastic-agent-windows-2016-1780275718"
  IMAGE_WIN_10: "platform-ingest-elastic-agent-windows-10-pro"
  IMAGE_WIN_11: "platform-ingest-elastic-agent-windows-11-pro"
  IMAGE_WIN_11_ARM64: "platform-ingest-elastic-agent-windows-11-pro-arm64"
  # Same version for all the azure images
  IMAGE_WIN_VERSION: "1.0.1780275718"

# This section is used to define the plugins that will be used in the pipeline.
# See https://buildkite.com/docs/pipelines/integrations/plugins/using#using-yaml-anchors-with-plugins
common:
  - google_oidc_plugin: &google_oidc_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
        project-id: "elastic-observability-ci"
        project-number: "911195782929"
# see https://github.com/avaly/gcp-secret-manager-buildkite-plugin/pull/10
# see https://github.com/avaly/gcp-secret-manager-buildkite-plugin/pull/11
#  - gcp_serverless_secrets_plugin: &gcp_serverless_secrets_plugin
      #avaly/gcp-secret-manager#v1.2.0:
  - gcp_serverless_secrets_plugin: &gcp_serverless_secrets_plugin
      elastic/gcp-secret-manager#v1.3.0-elastic:
        env:
          # These secrets are created in .github/workflows/serverless-project.yml
          ELASTICSEARCH_HOST: ea-serverless-it-elasticsearch-hostname
          ELASTICSEARCH_PASSWORD: ea-serverless-it-elasticsearch-password
          ELASTICSEARCH_USERNAME: ea-serverless-it-elasticsearch-username
          KIBANA_HOST: ea-serverless-it-kibana-hostname
          KIBANA_USERNAME: ea-serverless-it-kibana-username
          KIBANA_PASSWORD: ea-serverless-it-kibana-password
  - google_oidc_observability_plugin: &google_oidc_observability_plugin
      # See https://github.com/elastic/oblt-infra/blob/main/conf/resources/repos/elastic-agent/01-gcp-oidc.tf
      # This plugin authenticates to Google Cloud using the OIDC token.
      elastic/oblt-google-auth#v1.3.1:
        lifetime: 10800 # seconds
  - oblt_cli_plugin: &oblt_cli_plugin
      elastic/oblt-cli#v0.4.2:
        version-file: .oblt-cli-version
  - vault_github_token: &vault_github_token
      elastic/vault-github-token#v0.2.1:
  # Variants/Groups for the Windows ITs
  - windows_variants: &windows_variants
      - "default"
      - "fleet"
      - "fleet-endpoint-security"
      - "fleet-privileged"
      - "install-uninstall"
      - "standalone-upgrade"
      - "upgrade"
      - "upgrade-flavor"
  # Variants/Groups for the Linux AMD64 ITs
  - linux_deb_variants: &linux_deb_variants
    - container
    - deb
    - default
    - fleet
    - fleet-airgapped
    - fleet-airgapped-privileged
    - fleet-endpoint-security
    - fleet-privileged
    - fleet-upgrade-to-pr-build
    - fqdn
    - install-uninstall
    - standalone-upgrade
    - upgrade
    - upgrade-flavor

  # Variants/Groups for the Linux AMD64 ITs
  - linux_rpm_variants: &linux_rpm_variants
    - rpm

  # Variants/Groups for the Linux ARM ITs
  - linux_arm_variants: &linux_arm_variants
    - default
    - fleet
    - standalone-upgrade
    - upgrade
    - upgrade-flavor
    # ARM tests are enabled for only selected groups in order to save resources
    # - fleet-endpoint-security
    # - fleet-airgapped
    # - fleet-airgapped-privileged
    # - fleet-privileged
    # - fleet-upgrade-to-pr-build
    # - install-uninstall
    # - fqdn
    # - deb
    # - container

  # key to hold the list of k8s version to test against
  - k8s_test:
    versions: &k8s_test_versions
      - &k8s_min_test_version v1.27.16
      - v1.28.15
      - v1.29.14
      - v1.30.0
      - v1.31.0
      - v1.32.0
      - v1.33.0
      - &k8s_max_test_version v1.34.0
    variants: &k8s_test_variants
      - basic
      - complete
      - complete-wolfi
      - elastic-otel-collector
      - elastic-otel-collector-wolfi
      - service
      - slim
      - slim-wolfi
      - wolfi
    default_variants: &k8s_test_default_variants
      - complete
      - complete-wolfi
      - elastic-otel-collector
    env: &k8s_test_env
      K8S_VERSION: "{{matrix.version}}"
      DOCKER_VARIANTS: "{{matrix.variants}}"
      TARGET_ARCH: "amd64"
    agent: &k8s_test_agent
      provider: "gcp"
      machineType: "n2-standard-8"
      image: "${IMAGE_UBUNTU_2404_X86_64}"
      diskSizeGb: 80
    command: &k8s_test_command |
      buildkite-agent artifact download build/distributions/*-linux-amd64.docker.tar.gz . --step 'packaging-containers-amd64'
      .buildkite/scripts/steps/integration_tests_oblt-cli.sh kubernetes false
    command_retry: &k8s_test_command_with_sleep |
      MIN=0
      MAX=9
      # echo let's avoid running multiple requests at the same time to avoid overwhelming the cluster and causing deployment issues
      sleep $(( MIN + RANDOM % (MAX - MIN + 1) ))
      buildkite-agent artifact download build/distributions/*-linux-amd64.docker.tar.gz . --step 'packaging-containers-amd64'
      .buildkite/scripts/steps/integration_tests_oblt-cli.sh kubernetes false
    artifact_paths: &k8s_test_artifact_paths
      - build/*
      - build/diagnostics/**
      - build/*.pod_logs_dump/*

steps:
  - label: "Custom ECH Testing"
    key: integration-tests-ech
    depends_on:
      - packaging-containers-amd64
      - packaging-containers-arm64
      - packaging-amd64
    env:
      TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
      FORCE_ESS_CREATE: "true"
      INTEGRATION_SERVER_DOCKER_IMAGE: "docker.elastic.co/beats-ci/elastic-agent-cloud:git-${BUILDKITE_COMMIT:0:12}"
    command: |
      #!/usr/bin/env bash
      buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
      .buildkite/scripts/steps/integration_tests_oblt-cli.sh ech true
    artifact_paths:
      - build/*
      - build/diagnostics/**
    retry:
      automatic:
        limit: 1
    agents:
      provider: "gcp"
      machineType: "n2-standard-8"
      image: "${IMAGE_UBUNTU_2404_X86_64}"
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - label: Start ESS stack for integration tests
    key: integration-ess
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - ESS stack provision"
    command: .buildkite/scripts/steps/ess_start_oblt-cli.sh
    retry:
      automatic:
        limit: 1
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token

  - group: "Extended runtime leak tests"
    key: extended-integration-tests
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Runtime leak tests"
    depends_on:
      - integration-ess
    steps:
      - label: "Windows:2022:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64*  . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

      - label: "Windows:2025:amd64:sudo"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2025}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

      - label: "Ubuntu:2404:amd64:sudo"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/leak"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh fleet true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token

  - group: "Stateful: Windows (tier 1)"
    if: build.pull_request.id != null
    key: integration-tests-win-tier-1
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 1"
    depends_on:
      - integration-ess
    steps:
      - label: "windows:amd64:tier1:sudo:{{matrix.variant}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant: *windows_variants

      - label: "windows:amd64:tier1:non-sudo:{{matrix.variant}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_WIN_2022}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant:
              - default

  - group: "Stateful: Windows (tier 2)"
    # NOTE: scheduler should run only tier 3 tests.
    #       PRs or release branches should run tier 2 if there are relevant changes.
    if: '!(build.source == "schedule" || build.env("BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG") == "elastic-agent-pipeline-scheduler")'
    if_changed:
      include:
        - .buildkite/**
        - magefile.go
        - dev-tools/**
        - go.mod
        - go.sum
    key: integration-tests-win-tier-2
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 2"
    depends_on:
      - integration-ess
    steps:
      - label: "windows:amd64:tier2:sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
          # Disable redaction for Windows 2016 when using OIDC plugin due to some unsupported Windows build system
          # https://buildkite.com/resources/changelog/329-agent-v3-dot-104-oidc-token-requests-now-require-job-api-socket-for-redaction/#main-content
          BUILDKITE_AGENT_OIDC_REQUEST_TOKEN_SKIP_TOKEN_REDACTION: "true"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_2016}"
            variant: *windows_variants

      - label: "windows:amd64:tier2:non-sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
          # Disable redaction for Windows 2016 when using OIDC plugin due to some unsupported Windows build system
          # https://buildkite.com/resources/changelog/329-agent-v3-dot-104-oidc-token-requests-now-require-job-api-socket-for-redaction/#main-content
          BUILDKITE_AGENT_OIDC_REQUEST_TOKEN_SKIP_TOKEN_REDACTION: "true"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_2016}"
            variant:
              - default

  - group: "Stateful: Windows (tier 3)"
    key: integration-tests-win-tier-3
    # NOTE: as long as we use the scheduler pipeline we need to use BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG.
    #       We use that pipeline to run the tier 3 tests on a schedule for the active branches.
    if: build.source == "schedule" || build.env("BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG") == "elastic-agent-pipeline-scheduler"
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Windows - tier 3"
    depends_on:
      - integration-ess
    steps:
      - label: "windows:amd64:tier3:sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
          # Disable redaction for Windows 2016 when using OIDC plugin due to some unsupported Windows build system
          # https://buildkite.com/resources/changelog/329-agent-v3-dot-104-oidc-token-requests-now-require-job-api-socket-for-redaction/#main-content
          BUILDKITE_AGENT_OIDC_REQUEST_TOKEN_SKIP_TOKEN_REDACTION: "true"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "{{matrix.os}}"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_2016}"
              - "${IMAGE_WIN_2022}"
              - "${IMAGE_WIN_2025}"
            variant: *windows_variants

      - label: "windows:amd64:tier3:sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "{{matrix.os}}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8s_v5"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_10}"
              - "${IMAGE_WIN_11}"
            variant: *windows_variants

      - label: "windows:amd64:tier3:non-sudo:{{matrix.variant}}:{{matrix.os}}"
        depends_on:
          - packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "{{matrix.os}}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8s_v5"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            os:
              - "${IMAGE_WIN_10}"
              - "${IMAGE_WIN_11}"
            variant:
              - default

      - label: "windows:arm64:tier3:sudo:{{matrix.variant}}"
        depends_on:
          - packaging-arm64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-arm64* . --step 'packaging-arm64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "${IMAGE_WIN_11_ARM64}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8ps_v6"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant: *windows_variants

      - label: "windows:arm64:tier3:non-sudo:{{matrix.variant}}"
        depends_on:
          - packaging-arm64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-windows-arm64* . --step 'packaging-arm64'
          .buildkite/scripts/steps/integration_tests_tf.ps1 {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        agents:
          provider: "azure"
          image: "${IMAGE_WIN_11_ARM64}"
          imageVersion: "${IMAGE_WIN_VERSION}"
          vmSize: "Standard_D8ps_v6"
          diskSizeGb: "256"
        retry:
          automatic:
            limit: 1
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant:
              - default

  - group: "Stateful: Linux (tier 1)"
    if: build.pull_request.id != null
    key: integration-tests-linux-tier-1
    notify:
      - github_commit_status:
          context: "buildkite/elastic-agent-extended-testing - Linux - tier 1"
    depends_on:
      - integration-ess
    steps:
      - label: "linux:amd64:tier1:non-sudo:{{matrix.variant}}"
        depends_on: packaging-amd64
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step 'packaging-amd64'
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix.variant}} false
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant:
              - default

      - label: "linux:amd64:tier1:sudo:{{matrix.variant}}"
        depends_on:
          - packaging-amd64
        # due to deb group present in matrix tar.gz and deb packages artifacts are required
        env:
          TEST_PACKAGE: "github.com/elastic/elastic-agent/testing/integration/ess"
        command: |
          buildkite-agent artifact download build/distributions/elastic-agent-*-linux-x86_64* . --step packaging-amd64
          buildkite-agent artifact download build/distributions/elastic-agent-*-amd64.deb* . --step packaging-amd64
          .buildkite/scripts/steps/integration_tests_oblt-cli.sh {{matrix.variant}} true
        artifact_paths:
          - build/*
          - build/diagnostics/**
        retry:
          automatic:
            limit: 1
        agents:
          provider: "gcp"
          machineType: "n2-standard-8"
          image: "${IMAGE_UBUNTU_2404_X86_64}"
        plugins:
          - *google_oidc_observability_plugin
          - *oblt_cli_plugin
          - *vault_github_token
        matrix:
          setup:
            variant: *linux_deb_variants

  - group: "Stateful: Linux (tier 2)"
    # NOTE: scheduler should run only tier 3 tests.
    #       PRs or release branches should run tier 2 if there are relevant changes.

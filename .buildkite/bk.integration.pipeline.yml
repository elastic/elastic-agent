  - label: ESS stack cleanup
    depends_on:
      - integration-tests-kubernetes-tier-1
      - integration-tests-kubernetes-tier-2
      - integration-tests-kubernetes-tier-3
      - integration-tests-linux-tier-1
      - integration-tests-linux-tier-2
      - integration-tests-linux-tier-3
      - integration-tests-win-tier-1
      - integration-tests-win-tier-2
      - integration-tests-win-tier-3
      - extended-integration-tests
    allow_dependency_failure: true
    command: |
      .buildkite/scripts/steps/ess_cleanup_all.sh
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    plugins:
      - *google_oidc_observability_plugin
      - *oblt_cli_plugin
      - *vault_github_token
  - label: Aggregate test reports
    # Warning: The key has a hook in pre-command
    key: aggregate-reports
    depends_on:
      - integration-tests-ech
      - integration-tests-kubernetes-tier-1
      - integration-tests-kubernetes-tier-2
      - integration-tests-kubernetes-tier-3
      - integration-tests-linux-tier-1
      - integration-tests-linux-tier-2
      - integration-tests-linux-tier-3
      - integration-tests-win-tier-1
      - integration-tests-win-tier-2
      - integration-tests-win-tier-3
      - integration-tests-serverless
    allow_dependency_failure: true
    command: |
      buildkite-agent artifact download "build/*.xml" .
    agents:
      image: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:0.5"
      useCustomGlobalHooks: true
    soft_fail:
      - exit_status: "*"
    plugins:
      - elastic/vault-secrets#v0.1.0:
          path: "kv/ci-shared/platform-ingest/buildkite_analytics_token"
          field: "token"
          env_var: "BUILDKITE_ANALYTICS_TOKEN"
      - test-collector#v1.11.0:
          files: "build/*.xml"
          format: "junit"
          branches: "main"
          debug: true
      - *google_oidc_observability_plugin

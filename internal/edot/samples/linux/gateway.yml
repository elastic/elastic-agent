extensions:
  # Activate if API key authentication is needed
  # Read more: https://www.elastic.co/docs/reference/edot-collector/config/authentication-methods
  #   apikeyauth:
  #     endpoint: ${env:ELASTIC_ENDPOINT}
  #     application_privileges:
  #       - application: "apm"
  #         privileges: ["config_agent:read"]
  #         resources: ["*"]

  # Activate if central configuration is needed
  # apmconfig:
  #   source:
  #     elasticsearch:
  #       endpoint: ${env:ELASTIC_ENDPOINT}
  #       auth:
  #         authenticator: apikeyauth
  #   opamp:
  #     protocols:
  #       http:
  #         endpoint: 0.0.0.0:4320
  #         auth:
  #           authenticator: apikeyauth
  #         # tls:
  #         #   cert_file: your/path/to/server.crt
  #         #   key_file: your/path/to/server.key

connectors:
  elasticapm:

receivers:
  otlp:
    protocols:
      grpc:
        # auth:
        #  authenticator: apikeyauth
        endpoint: 0.0.0.0:4317
        # https://www.elastic.co/docs/reference/edot-collector/config/default-config-standalone#collector-receiver-configuration
        # tls:
        #   cert_file: your/path/to/server.crt
        #   key_file: your/path/to/server.key
      http:
        # auth:
        #  authenticator: apikeyauth
        endpoint: 0.0.0.0:4318
        # tls:
        #   cert_file: your/path/to/server.crt
        #   key_file: your/path/to/server.key

processors:
  batch:
    send_batch_size: 1000
    timeout: 1s
    send_batch_max_size: 1500
  batch/metrics:
    send_batch_max_size: 0
    timeout: 1s
  elasticapm: {}

exporters:
  debug: {}
  elasticsearch/otel:
    endpoints:
      - ${env:ELASTIC_ENDPOINT}
    api_key: ${env:ELASTIC_API_KEY}
    # https://www.elastic.co/docs/reference/edot-collector/config/default-config-standalone#secure-the-connection-between-the-edot-collector-and-elastic
    # tls:
    #   ca_file: "/path/to/elastic-ca.crt"
    #   insecure_skip_verify: true
    mapping:
      mode: otel

service:
  # extensions:
    # - apikeyauth
    # - apmconfig
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch/metrics]
      exporters: [debug, elasticsearch/otel]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, elasticapm, elasticsearch/otel]
    traces:
      receivers: [otlp]
      processors: [batch, elasticapm]
      exporters: [debug, elasticapm, elasticsearch/otel]
    metrics/aggregated-otel-metrics:
      receivers:
        - elasticapm
      processors: []
      exporters:
        - debug
        - elasticsearch/otel

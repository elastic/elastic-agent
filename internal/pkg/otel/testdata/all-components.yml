exporters:
  debug:
  elasticsearch:
    endpoints:
      - http://localhost:9200
  file:
    path: /tmp/file-exporter-output.json
  otlp:
    endpoint: localhots:4317
  otlphttp:
    endpoint: https://localhost.com:4318
  nop:

extensions:
  health_check:
  memory_limiter:
    check_interval: 5s
    limit_mib: 100
  headers_setter:
    headers:
      - action: insert
        key: X-Scope-OrgID
        from_context: tenant_id
        default_value: Org-ID
  azure_auth:
    managed_identity:
  azure_encoding:

processors:
  attributes:
    actions:
      - action: insert
        key: key1
        value: value1
  batch:
  cumulativetodelta:
  elasticinframetrics:
  filter:
  resource:
    attributes:
      - action: insert
        key: key1
        value: value1
  resourcedetection:
  transform:
  memory_limiter/processor:
    check_interval: 1s
    limit_mib: 4000
    spike_limit_mib: 800
  elastictrace:

receivers:
  nop:
  filelog:
    include:
      - /filelog/path
  otlp:
    protocols:
      grpc:
      http:
  httpcheck:
    targets:
      - endpoint: http://localhost:80
        method: GET
    collection_interval: 10s
  jaeger:
    protocols:
      grpc:
  zipkin:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 5s
          static_configs:
            - targets: ['0.0.0.0:8888']

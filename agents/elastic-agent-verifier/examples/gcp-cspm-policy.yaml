# GCP CSPM + Asset Discovery + Audit Logs verification policy
#
# Prerequisites:
#   gcloud auth application-default login
#   export GCP_PROJECT_ID=your-project-id
#
# Build:
#   mage build:all
#
# Run:
#   ./build/elastic-agent otel --config path/to/gcp-cspm-policy.yaml

receivers:
  verifier:
    cloud_connector_id: "cc-gcp-local"
    cloud_connector_name: "GCP Local Test"
    namespace: "default"
    account_type: "single_account"
    verification_id: "verify-gcp-cspm-001"
    verification_type: "on_demand"

    providers:
      gcp:
        credentials:
          use_default_credentials: true
          project_id: "${GCP_PROJECT_ID}"

    policies:
      - policy_id: "policy-gcp-cspm"
        policy_name: "GCP Cloud Security Posture"
        integrations:
          - policy_template: "cspm"
            package_name: "gcp"
            package_policy_id: "pp-cspm-001"
            package_title: "GCP"
            config:
              project_id: "${GCP_PROJECT_ID}"

          - policy_template: "asset_inventory"
            package_name: "gcp"
            package_policy_id: "pp-asset-001"
            package_title: "GCP"
            config:
              project_id: "${GCP_PROJECT_ID}"

          - policy_template: "audit"
            package_name: "gcp"
            package_policy_id: "pp-audit-001"
            package_title: "GCP"
            config:
              project_id: "${GCP_PROJECT_ID}"

exporters:
  debug:
    verbosity: detailed

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: localhost
                port: 18888
  pipelines:
    logs:
      receivers: [verifier]
      exporters: [debug]

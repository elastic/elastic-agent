# Azure CSPM + Asset Discovery + Activity Logs verification policy
#
# Prerequisites:
#   az login
#   export AZURE_SUBSCRIPTION_ID=your-subscription-id
#
# Build:
#   mage build:all
#
# Run:
#   ./build/elastic-agent otel --config path/to/azure-cspm-policy.yaml

receivers:
  verifier:
    cloud_connector_id: "cc-azure-local"
    cloud_connector_name: "Azure Local Test"
    namespace: "default"
    account_type: "single_account"
    verification_id: "verify-azure-cspm-001"
    verification_type: "on_demand"

    providers:
      azure:
        credentials:
          use_default_credentials: true
          subscription_id: "${AZURE_SUBSCRIPTION_ID}"

    policies:
      - policy_id: "policy-azure-cspm"
        policy_name: "Azure Cloud Security Posture"
        integrations:
          - policy_template: "cspm"
            package_name: "azure"
            package_policy_id: "pp-cspm-001"
            package_title: "Azure"

          - policy_template: "asset_inventory"
            package_name: "azure"
            package_policy_id: "pp-asset-001"
            package_title: "Azure"

          - policy_template: "activitylogs"
            package_name: "azure"
            package_policy_id: "pp-activitylogs-001"
            package_title: "Azure"

exporters:
  debug:
    verbosity: detailed

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: localhost
                port: 18888
  pipelines:
    logs:
      receivers: [verifier]
      exporters: [debug]
